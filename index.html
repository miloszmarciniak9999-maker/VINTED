<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EDU CORE PRO - Naprawiony Czat</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root {
            --bg: #0b0e14; --card: #1c2128; --primary: #007aff; --text: #f0f6fc;
            --sec: #8b949e; --border: rgba(255, 255, 255, 0.08); --danger: #ff453a;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        .container { padding: 12px; max-width: 480px; margin: 0 auto; }
        select, input, textarea { width: 100%; padding: 14px; background: #1c2128; border: 1px solid var(--border); border-radius: 15px; color: white; margin-bottom: 10px; outline: none; box-sizing: border-box; }
        .ad-card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid var(--border); cursor: pointer; }
        .navbar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 380px; background: rgba(28, 33, 40, 0.95); backdrop-filter: blur(15px); display: flex; border-radius: 25px; border: 1px solid var(--border); padding: 10px 0; z-index: 900; }
        .nav-item { flex: 1; text-align: center; color: var(--sec); font-size: 22px; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .page { display: none; } .page.active { display: block; }
        #chat-window { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: none; flex-direction: column; }
        .btn-action { width: 100%; padding: 14px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; background: var(--primary); color: white; }
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 10px 20px; border-radius: 50px; z-index: 9999; transition: 0.5s; }
    </style>
</head>
<body>

<div id="toast">Gotowe!</div>

<div id="chat-window">
    <div style="padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;">
        <b id="chat-title">Rozmowa</b>
        <button onclick="closeChat()" style="background:none; border:none; color:white; font-size: 20px;">✕</button>
    </div>
    <div id="chat-box" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:10px;"></div>
    <div style="padding: 15px; display: flex; gap: 8px;">
        <input type="text" id="chat-input" placeholder="Napisz coś..." style="margin:0">
        <button onclick="sendMsg()" style="background:var(--primary); border:none; border-radius:12px; width:50px; color:white;">➔</button>
    </div>
</div>

<div id="home" class="page active">
    <div class="container">
        <h2>Ogłoszenia</h2>
        <div id="adsContainer"></div>
    </div>
</div>

<div id="messages" class="page">
    <div class="container">
        <h2>Twoje Rozmowy</h2>
        <div id="chatListContainer"></div>
    </div>
</div>

<div id="profile" class="page">
    <div class="container">
        <h2>Twój Profil</h2>
        <input type="text" id="userName" placeholder="Imię">
        <input type="email" id="userEmail" placeholder="Email">
        <button onclick="saveUser()" class="btn-action">Zapisz Profil</button>
    </div>
</div>

<nav class="navbar">
    <div class="nav-item active" onclick="nav('home', this)">🏠</div>
    <div class="nav-item" onclick="nav('messages', this)">💬</div>
    <div class="nav-item" onclick="nav('profile', this)">👤</div>
</nav>

<script>
    // Konfiguracja Twojego Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAbs_Z_Oqy2FrWP3CuGK9w9qjDMYGDhgck",
        authDomain: "educore-5c9f4.firebaseapp.com",
        databaseURL: "https://educore-5c9f4-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "educore-5c9f4",
        storageBucket: "educore-5c9f4.firebasestorage.app",
        messagingSenderId: "213055938628",
        appId: "1:213055938628:web:408b3beb4273d4f6f59c11"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('edu_user'));
    let activeChatID = null;

    if(user) {
        document.getElementById('userName').value = user.name;
        document.getElementById('userEmail').value = user.email;
    }

    // --- LOGIKA POMOCNICZA ---
    function cleanEmail(e) { return e ? e.toLowerCase().replace(/\./g, ',') : ""; }
    function getChatID(e1, e2) { return [cleanEmail(e1), cleanEmail(e2)].sort().join('_'); }

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(id === 'home') renderAds();
        if(id === 'messages') renderChatList();
    }

    function saveUser() {
        user = { name: document.getElementById('userName').value, email: document.getElementById('userEmail').value };
        localStorage.setItem('edu_user', JSON.stringify(user));
        alert("Zapisano!");
    }

    // --- CZAT I LISTA ---
    function openChat(targetEmail, targetName) {
        if(!user) return nav('profile', document.querySelectorAll('.nav-item')[2]);
        activeChatID = getChatID(user.email, targetEmail);
        document.getElementById('chat-title').innerText = targetName;
        document.getElementById('chat-window').style.display = 'flex';

        db.ref('chats/' + activeChatID).on('value', snap => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            snap.forEach(m => {
                const d = m.val();
                const isMe = d.sender === user.email;
                box.innerHTML += `<div style="align-self:${isMe?'flex-end':'flex-start'}; background:${isMe?'var(--primary)':'#252b33'}; padding:10px; border-radius:12px; max-width:80%;">${d.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const i = document.getElementById('chat-input');
        if(!i.value || !activeChatID) return;
        db.ref('chats/' + activeChatID).push({ sender: user.email, text: i.value, time: Date.now() });
        i.value = '';
    }

    function closeChat() { document.getElementById('chat-window').style.display = 'none'; }

    function renderChatList() {
        if(!user) return;
        const myClean = cleanEmail(user.email);
        db.ref('chats').on('value', snap => {
            const list = document.getElementById('chatListContainer'); list.innerHTML = '';
            snap.forEach(c => {
                if(c.key.includes(myClean)) {
                    const partner = c.key.split('_').find(p => p !== myClean).replace(/,/g, '.');
                    list.innerHTML += `<div class="ad-card" onclick="openChat('${partner}', '${partner}')"><b>💬 Rozmowa z: ${partner}</b></div>`;
                }
            });
        });
    }

    function renderAds() {
        db.ref('ads').on('value', snap => {
            const cont = document.getElementById('adsContainer'); cont.innerHTML = '';
            snap.forEach(c => {
                const a = c.val();
                const isMe = user && a.email === user.email;
                cont.innerHTML += `
                    <div class="ad-card">
                        <h3>${a.sub}</h3>
                        <p>${a.desc}</p>
                        ${!isMe ? `<button onclick="openChat('${a.email}','${a.owner}')" class="btn-action">Napisz wiadomość</button>` : '<i>Twoje ogłoszenie</i>'}
                    </div>`;
            });
        });
    }

    renderAds();
</script>
</body>
</html>
