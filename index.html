<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EDU CORE PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root {
            --bg: #0b0e14; --card: #1c2128; --primary: #007aff; --text: #f0f6fc;
            --sec: #8b949e; --border: rgba(255, 255, 255, 0.08); --danger: #ff453a;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        .container { padding: 12px; max-width: 480px; margin: 0 auto; }
        
        /* FIX WYGLĄDU - Usunięcie kresek/strzałek */
        select, input, textarea { 
            width: 100%; padding: 14px; background: #1c2128; border: 1px solid var(--border);
            border-radius: 15px; color: white; margin-bottom: 10px; font-size: 14px; outline: none;
        }
        
        .subject-scroll { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 15px; padding-bottom: 5px; scrollbar-width: none; }
        .chip { white-space: nowrap; padding: 8px 16px; background: #252b33; border: 1px solid var(--border); border-radius: 50px; font-size: 13px; cursor: pointer; }
        .chip.active { background: var(--primary); color: white; }
        
        .main-nav-tabs { display: flex; background: rgba(255, 255, 255, 0.03); padding: 4px; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 12px; background: transparent; color: var(--sec); cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        .ad-card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid var(--border); }
        .navbar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 380px; background: rgba(28, 33, 40, 0.95); backdrop-filter: blur(15px); display: flex; border-radius: 25px; border: 1px solid var(--border); padding: 10px 0; z-index: 900; }
        .nav-item { flex: 1; text-align: center; color: var(--sec); cursor: pointer; font-size: 22px; }
        .nav-item.active { color: var(--primary); }

        #chat-window { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: none; flex-direction: column; }
        .msg { padding: 10px; border-radius: 12px; max-width: 80%; font-size: 14px; margin-bottom: 5px; position: relative; }
        .msg-me { align-self: flex-end; background: var(--primary); color: white; }
        .msg-them { align-self: flex-start; background: #252b33; color: white; }
        
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--danger); color: white; padding: 10px 20px; border-radius: 50px; z-index: 9999; transition: 0.5s; }
    </style>
</head>
<body>

<div id="toast">Musisz się zalogować!</div>

<div id="chat-window">
    <div style="padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;">
        <b id="chat-title">Czat</b>
        <button onclick="closeChat()" style="background:none; border:none; color:white; font-size: 24px;">✕</button>
    </div>
    <div id="chat-box" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
    <div style="padding: 15px; display: flex; gap: 8px;">
        <input type="text" id="chat-input" placeholder="Wiadomość..." style="margin:0">
        <button onclick="sendMsg()" style="background:var(--primary); border:none; border-radius:12px; padding:0 20px; color:white;">➔</button>
    </div>
</div>

<div id="home" class="page active">
    <div class="container">
        <div class="main-nav-tabs">
            <button class="tab-btn active" onclick="setHomeView('tutor', this)">Nauczyciele</button>
            <button class="tab-btn" onclick="setHomeView('student', this)">Uczniowie</button>
        </div>
        <input type="text" id="filterSearch" placeholder="🔍 Szukaj..." oninput="renderAds()">
        <div id="adsContainer"></div>
    </div>
</div>

<div id="messages" class="page">
    <div class="container">
        <h2>Twoje rozmowy</h2>
        <div id="chatListContainer"></div>
    </div>
</div>

<div id="add" class="page">
    <div class="container">
        <h2>Dodaj ogłoszenie</h2>
        <div class="main-nav-tabs">
            <button class="tab-btn active" onclick="addRole='tutor'; updateAddTabs(this)">Będę uczyć</button>
            <button class="tab-btn" onclick="addRole='student'; updateAddTabs(this)">Szukam lekcji</button>
        </div>
        <input type="text" id="addSub" placeholder="Przedmiot">
        <input type="number" id="addPrice" placeholder="Cena zł/h">
        <select id="addLevel">
            <option value="Podstawowy">Podstawowy</option>
            <option value="Średni">Średni</option>
            <option value="Zaawansowany">Zaawansowany</option>
        </select>
        <textarea id="addDesc" rows="3" placeholder="Opis..."></textarea>
        <button onclick="postAd()" style="width:100%; padding:15px; border-radius:15px; border:none; background:var(--primary); color:white; font-weight:800;">Opublikuj</button>
    </div>
</div>

<div id="profile" class="page">
    <div class="container">
        <h2>Profil</h2>
        <input type="text" id="userName" placeholder="Imię">
        <input type="email" id="userEmail" placeholder="E-mail">
        <button onclick="saveUser()" style="width:100%; padding:15px; border-radius:15px; background:var(--primary); color:white; border:none;">Zapisz</button>
    </div>
</div>

<nav class="navbar">
    <div class="nav-item active" onclick="nav('home', this)">🏠</div>
    <div class="nav-item" onclick="nav('messages', this)">💬</div>
    <div class="nav-item" onclick="nav('add', this)">➕</div>
    <div class="nav-item" onclick="nav('profile', this)">👤</div>
</nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAbs_Z_Oqy2FrWP3CuGK9w9qjDMYGDhgck",
        authDomain: "educore-5c9f4.firebaseapp.com",
        databaseURL: "https://educore-5c9f4-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "educore-5c9f4",
        storageBucket: "educore-5c9f4.firebasestorage.app",
        messagingSenderId: "213055938628",
        appId: "1:213055938628:web:408b3beb4273d4f6f59c11"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const ADMIN_EMAIL = "milosz.marciniak9999@gmail.com";

    let user = JSON.parse(localStorage.getItem('edu_user'));
    let currentView = 'tutor';
    let addRole = 'tutor';
    let activeChatID = null;

    function showToast(m) {
        const t = document.getElementById('toast'); t.innerText = m; t.style.top = '25px';
        setTimeout(() => t.style.top = '-100px', 3000);
    }

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(id === 'home') renderAds();
        if(id === 'messages') renderChatList();
    }

    function saveUser() {
        const n = document.getElementById('userName').value;
        const e = document.getElementById('userEmail').value;
        if(n && e) {
            user = {name: n, email: e};
            localStorage.setItem('edu_user', JSON.stringify(user));
            showToast("Zapisano!");
        }
    }

    function postAd() {
        if(!user) return showToast("Musisz uzupełnić profil (E-mail), aby dodać ogłoszenie!");
        db.ref('ads').push({
            sub: document.getElementById('addSub').value,
            price: document.getElementById('addPrice').value,
            level: document.getElementById('addLevel').value,
            desc: document.getElementById('addDesc').value,
            role: addRole, owner: user.name, email: user.email, time: Date.now()
        }).then(() => { showToast("Dodano!"); nav('home', document.querySelectorAll('.nav-item')[0]); });
    }

    function renderAds() {
        db.ref('ads').on('value', snap => {
            const cont = document.getElementById('adsContainer'); cont.innerHTML = '';
            snap.forEach(c => {
                const a = c.val();
                if(a.role !== currentView) return;
                const isOwner = user && (user.email === a.email || user.email === ADMIN_EMAIL);
                cont.innerHTML += `
                    <div class="ad-card">
                        <b>${a.sub}</b> - ${a.price} zł/h<br><small>${a.desc}</small><br>
                        ${isOwner ? `<button onclick="db.ref('ads').child('${c.key}').remove()" style="color:red; background:none; border:none; padding:5px 0; cursor:pointer;">Usuń ogłoszenie</button>` : 
                        `<button onclick="openChat('${a.email}','${a.owner}')" style="width:100%; margin-top:10px; padding:10px; border-radius:10px; border:none; background:var(--primary); color:white;">Napisz wiadomość</button>`}
                    </div>`;
            });
        });
    }

    function openChat(pEmail, pName) {
        if(!user) return showToast("Zaloguj się, aby pisać wiadomości!");
        activeChatID = [user.email, pEmail].sort().join('_').replace(/\./g, ',');
        document.getElementById('chat-title').innerText = "Rozmowa z: " + pName;
        document.getElementById('chat-window').style.display = 'flex';
        db.ref('chats/' + activeChatID).on('value', snap => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            snap.forEach(m => {
                const d = m.val();
                const isMe = d.sender === user.email;
                const canDelete = user.email === ADMIN_EMAIL;
                box.innerHTML += `
                    <div class="msg ${isMe?'msg-me':'msg-them'}">
                        ${d.text}
                        ${canDelete ? `<div onclick="db.ref('chats/${activeChatID}/${m.key}').remove()" style="font-size:10px; color:red; cursor:pointer;">Usuń</div>` : ''}
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const i = document.getElementById('chat-input');
        if(!i.value || !activeChatID) return;
        db.ref('chats/' + activeChatID).push({ sender: user.email, text: i.value, time: Date.now() });
        i.value = '';
    }

    function renderChatList() {
        if(!user) return;
        db.ref('chats').on('value', snap => {
            const list = document.getElementById('chatListContainer'); list.innerHTML = '';
            snap.forEach(c => {
                // PRYWATNOŚĆ: Tylko Twoje rozmowy lub Admin widzi wszystko
                if(c.key.includes(user.email.replace(/\./g, ',')) || user.email === ADMIN_EMAIL) {
                    const p = c.key.split('_').find(x => x !== user.email.replace(/\./g, ',')).replace(/,/g,'.');
                    list.innerHTML += `<div class="ad-card" onclick="openChat('${p}', '${p}')">Rozmowa z: ${p}</div>`;
                }
            });
        });
    }

    function closeChat() { document.getElementById('chat-window').style.display = 'none'; }
    function setHomeView(v, el) { currentView = v; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); renderAds(); }
    function updateAddTabs(el) { document.querySelectorAll('#add .tab-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); }

    renderAds();
</script>
</body>
</html>
