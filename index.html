<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Marketing SaaS</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#020617;
color:white;
}

header{
padding:15px;
border-bottom:1px solid #1e293b;
display:flex;
justify-content:space-between;
}

.container{
padding:20px;
}

.card{
background:#0f172a;
padding:15px;
border-radius:12px;
margin-bottom:15px;
border:1px solid #1e293b;
}

input{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:none;
background:#020617;
color:white;
}

button{
background:#2563eb;
border:none;
padding:10px;
border-radius:8px;
color:white;
margin-top:8px;
cursor:pointer;
}

.hidden{display:none;}

</style>
</head>

<body>

<header>
<h3>🤖 AI Marketing PRO+</h3>
<div id="user"></div>
</header>

<div class="container">

<!-- LOGIN -->
<div id="login" class="card">
<h3>🔐 Logowanie</h3>
<input id="email" placeholder="email">
<input id="pass" type="password" placeholder="hasło">
<button onclick="login()">Zaloguj</button>
<button onclick="register()">Rejestracja</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="card">
<h3>🎬 Generator Viral Hooks AI</h3>
<button onclick="hooks()">Generuj</button>
<div id="hooks"></div>
</div>

<div class="card">
<h3>🧠 Analiza konkurencji</h3>
<input id="competitor" placeholder="@konto">
<button onclick="analyzeCompetitor()">Analizuj</button>
<div id="competitorResult"></div>
</div>

<div class="card">
<h3>📊 Dashboard Analytics</h3>
<div id="stats"></div>
</div>

</div>

</div>

<script>

// auth
function register(){
let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;

localStorage.setItem("user",JSON.stringify({email,pass}));
alert("konto utworzone");
}

function login(){
let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;

let user=JSON.parse(localStorage.getItem("user"));

if(user && user.email===email && user.pass===pass){
document.getElementById("login").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
document.getElementById("user").innerText=email;
loadStats();
}
}

// viral hooks
function hooks(){
let arr=[
"To konto rośnie szybciej niż 99%",
"Nikt Ci tego nie powie",
"Ten trik daje viral",
"3 sekundy które zmienią wszystko"
];
let h=arr[Math.floor(Math.random()*arr.length)];
document.getElementById("hooks").innerText=h;
saveStat("hooks");
}

// competitor
function analyzeCompetitor(){
let name=document.getElementById("competitor").value;

let result="📊 Analiza "+name+"\n";
result+="- publikuje 5x tygodniowo\n";
result+="- viral hooks\n";
result+="- mocne CTA\n";

document.getElementById("competitorResult").innerText=result;

saveStat("analysis");
}

// analytics
function saveStat(type){
let stats=JSON.parse(localStorage.getItem("stats"))||{hooks:0,analysis:0};
stats[type]++;
localStorage.setItem("stats",JSON.stringify(stats));
loadStats();
}

function loadStats(){
let stats=JSON.parse(localStorage.getItem("stats"))||{hooks:0,analysis:0};
document.getElementById("stats").innerText=
"Hooki wygenerowane: "+stats.hooks+
"\nAnalizy konkurencji: "+stats.analysis;
}

</script>

</body>
</html>
