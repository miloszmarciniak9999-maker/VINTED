<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EDU CORE PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #050505;
            --card: #121212;
            --primary: #2563eb;
            --accent: #3b82f6;
            --text: #ffffff;
            --sec: #a1a1aa;
            --border: #27272a;
            --danger: #ef4444;
            --success: #22c55e;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 120px;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- UI MODERNIZACJA --- */
        header {
            padding: 20px;
            text-align: center;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .container { padding: 15px; max-width: 600px; margin: 0 auto; }

        .role-selector {
            display: flex;
            background: var(--card);
            padding: 5px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }
        .role-btn {
            flex: 1; padding: 12px; border: none; border-radius: 12px;
            background: transparent; color: var(--sec); cursor: pointer;
            font-weight: 600; transition: all 0.3s ease;
        }
        .role-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }

        /* --- OGŁOSZENIA --- */
        .ad-card {
            background: var(--card); border-radius: 20px; padding: 20px;
            margin-bottom: 18px; border: 1px solid var(--border);
            transition: transform 0.2s;
        }
        .price-tag { 
            font-size: 18px; font-weight: 800; color: var(--accent); margin: 10px 0;
        }
        .type-badge {
            display: inline-block; padding: 4px 10px; border-radius: 8px;
            font-size: 11px; text-transform: uppercase; font-weight: 700;
            background: var(--border); color: var(--sec);
        }

        .btn-main {
            width: 100%; padding: 16px; border: none; border-radius: 16px;
            background: var(--primary); color: white; font-weight: 700;
            cursor: pointer; margin-top: 10px; font-size: 16px;
            transition: opacity 0.2s;
        }
        .btn-main:active { opacity: 0.8; }

        /* --- CZAT --- */
        #chat-window {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; display: none; flex-direction: column;
        }
        .chat-header {
            padding: 20px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 15px;
        }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px;
        }
        .msg-bubble {
            max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 15px;
            line-height: 1.4;
        }
        .msg-me { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 4px; }
        .msg-them { align-self: flex-start; background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

        .chat-input-area {
            padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px;
            background: var(--bg); padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }

        /* --- NAVBAR --- */
        .navbar {
            position: fixed; bottom: 0; width: 100%; background: rgba(18, 18, 18, 0.9);
            backdrop-filter: blur(20px); display: flex; border-top: 1px solid var(--border);
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); z-index: 900;
        }
        .nav-item { flex: 1; text-align: center; color: var(--sec); font-size: 12px; position: relative; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 24px; display: block; margin-bottom: 4px; }

        #chat-dot {
            position: absolute; top: 0; right: 30%; width: 10px; height: 10px;
            background: var(--danger); border-radius: 50%; display: none;
            box-shadow: 0 0 10px var(--danger);
        }

        .page { display: none; }
        .page.active { display: block; }

        select, input, textarea { 
            width: 100%; padding: 16px; background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; color: white; margin-bottom: 12px; box-sizing: border-box; font-size: 16px;
        }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 22px; font-weight: 900; letter-spacing: -0.5px;">EDUCORE <span style="color:var(--primary)">PRO</span></h1>
</header>

<div id="chat-window">
    <div class="chat-header">
        <button onclick="closeChat()" style="background:none; border:none; color:var(--primary); font-size: 24px;">←</button>
        <div id="chat-with-info">
            <b id="chat-user-name">Rozmowa</b><br>
            <small id="chat-user-mail" style="color:var(--sec)"></small>
        </div>
    </div>
    <div class="chat-messages" id="chat-box"></div>
    <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Napisz wiadomość..." style="margin:0">
        <button class="btn-main" onclick="sendChatMessage()" style="width:auto; margin:0; padding: 0 20px;">➔</button>
    </div>
</div>

<div id="home" class="page active">
    <div class="container">
        <div class="role-selector">
            <button class="role-btn active" id="btnStudent" onclick="setRole('student')">🎓 Szukam</button>
            <button class="role-btn" id="btnTutor" onclick="setRole('tutor')">👨‍🏫 Moje</button>
        </div>
        <div id="adsContainer"></div>
    </div>
</div>

<div id="messages" class="page">
    <div class="container">
        <h2 style="margin-bottom:20px">Wiadomości</h2>
        <div id="msgsListContainer"></div>
    </div>
</div>

<div id="add" class="page">
    <div class="container">
        <h2>Dodaj Ogłoszenie</h2>
        <input type="text" id="addSub" placeholder="Czego uczysz? (np. Angielski)">
        <input type="text" id="addPrice" placeholder="Cena (np. 80 zł/h)">
        <select id="addType" onchange="toggleLocation()">
            <option value="online">Lekcje Online 🌐</option>
            <option value="live">Na żywo 📍</option>
        </select>
        <input type="text" id="addLoc" placeholder="Miejscowość" style="display:none">
        <textarea id="addDesc" rows="4" placeholder="Opisz swoje doświadczenie..."></textarea>
        <button class="btn-main" onclick="postAd()">Opublikuj Ofertę</button>
    </div>
</div>

<div id="profile" class="page">
    <div class="container" id="profileContent">
        <h2>Twój Profil</h2>
        <input type="text" id="userName" placeholder="Twoje Imię / Nick">
        <input type="email" id="userEmail" placeholder="E-mail kontaktowy">
        <button class="btn-main" onclick="saveUser()">Zapisz i kontynuuj</button>
    </div>
</div>

<nav class="navbar">
    <div class="nav-item active" onclick="nav('home', this)">
        <span class="nav-icon">🏠</span> Eksploruj
    </div>
    <div class="nav-item" onclick="nav('messages', this)">
        <div id="chat-dot"></div>
        <span class="nav-icon">💬</span> Czaty
    </div>
    <div class="nav-item" onclick="nav('add', this)">
        <span class="nav-icon">➕</span> Dodaj
    </div>
    <div class="nav-item" onclick="nav('profile', this)">
        <span class="nav-icon">⚙️</span> Profil
    </div>
</nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAbs_Z_Oqy2FrWP3CuGK9w9qjDMYGDhgck",
        authDomain: "educore-5c9f4.firebaseapp.com",
        databaseURL: "https://educore-5c9f4-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "educore-5c9f4",
        storageBucket: "educore-5c9f4.firebasestorage.app",
        messagingSenderId: "213055938628",
        appId: "1:213055938628:web:408b3beb4273d4f6f59c11"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const adminEmail = "milosz.marciniak9999@gmail.com";

    let user = JSON.parse(localStorage.getItem('edu_user'));
    let currentRole = 'student';
    let chatPartner = null;

    function toggleLocation() {
        const type = document.getElementById('addType').value;
        document.getElementById('addLoc').style.display = (type === 'live') ? 'block' : 'none';
    }

    function setRole(role) {
        currentRole = role;
        document.getElementById('btnStudent').classList.toggle('active', role === 'student');
        document.getElementById('btnTutor').classList.toggle('active', role === 'tutor');
        renderAds();
    }

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(id === 'home') renderAds();
        if(id === 'messages') {
            renderChatList();
            document.getElementById('chat-dot').style.display = 'none';
        }
        if(id === 'profile') renderProfile();
    }

    function saveUser() {
        const n = document.getElementById('userName').value;
        const e = document.getElementById('userEmail').value;
        if(n && e) {
            user = {name: n, email: e};
            localStorage.setItem('edu_user', JSON.stringify(user));
            location.reload();
        }
    }

    function renderProfile() {
        if(user) {
            document.getElementById('profileContent').innerHTML = `
                <div style="text-align:center; padding: 40px 20px;">
                    <div style="width:80px; height:80px; background:var(--primary); border-radius:50%; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; font-size:30px">👤</div>
                    <h2 style="margin:0">${user.name}</h2>
                    <p style="color:var(--sec)">${user.email}</p>
                    <button class="btn-main" style="background: var(--danger); margin-top: 40px;" onclick="localStorage.clear(); location.reload();">Wyloguj się</button>
                </div>`;
        }
    }

    function postAd() {
        if(!user) return alert("Uzupełnij profil!");
        const sub = document.getElementById('addSub').value;
        const price = document.getElementById('addPrice').value;
        const desc = document.getElementById('addDesc').value;
        const type = document.getElementById('addType').value;
        const loc = document.getElementById('addLoc').value;

        db.ref('ads').push({
            sub, price, desc, type, loc, owner: user.name, email: user.email, time: Date.now()
        }).then(() => {
            alert("Dodano!");
            nav('home', document.querySelector('.nav-item'));
        });
    }

    function deleteAd(key) {
        if(confirm("Usunąć?")) db.ref('ads').child(key).remove();
    }

    function renderAds() {
        db.ref('ads').on('value', (snap) => {
            const container = document.getElementById('adsContainer');
            container.innerHTML = '';
            snap.forEach(child => {
                const a = child.val();
                const isMyAd = user && user.email === a.email;
                if (currentRole === 'student' || (currentRole === 'tutor' && isMyAd)) {
                    container.innerHTML += `
                        <div class="ad-card">
                            <div style="display:flex; justify-content:space-between">
                                <span class="type-badge">${a.type === 'online' ? '🌐 Online' : '📍 ' + a.loc}</span>
                                ${isMyAd || (user && user.email === adminEmail) ? `<span onclick="deleteAd('${child.key}')" style="color:var(--danger)">Usuń</span>` : ''}
                            </div>
                            <h3 style="margin:12px 0 5px 0">${a.sub}</h3>
                            <p style="color:var(--sec); font-size:14px; margin:0">${a.desc}</p>
                            <div class="price-tag">${a.price}</div>
                            ${!isMyAd ? `<button class="btn-main" onclick="openChat('${a.owner}', '${a.email}')">Napisz wiadomość</button>` : ''}
                        </div>`;
                }
            });
        });
    }

    // --- LOGIKA CZATU WEWNĘTRZNEGO ---
    function openChat(name, email) {
        if(!user) return nav('profile', document.querySelectorAll('.nav-item')[3]);
        chatPartner = {name, email};
        document.getElementById('chat-user-name').innerText = name;
        document.getElementById('chat-user-mail').innerText = email;
        document.getElementById('chat-window').style.display = 'flex';
        loadMessages();
    }

    function closeChat() { document.getElementById('chat-window').style.display = 'none'; chatPartner = null; }

    function loadMessages() {
        const chatId = [user.email, chatPartner.email].sort().join('_').replace(/\./g, ',');
        db.ref('chats/' + chatId).on('value', (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            snap.forEach(child => {
                const m = child.val();
                const side = m.sender === user.email ? 'msg-me' : 'msg-them';
                box.innerHTML += `<div class="msg-bubble ${side}">${m.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendChatMessage() {
        const input = document.getElementById('chat-input');
        if(!input.value || !chatPartner) return;
        const chatId = [user.email, chatPartner.email].sort().join('_').replace(/\./g, ',');
        db.ref('chats/' + chatId).push({
            sender: user.email,
            senderName: user.name,
            text: input.value,
            time: Date.now()
        });
        // Powiadomienie dla odbiorcy
        db.ref('notifications/' + chatPartner.email.replace(/\./g, ',')).set(Date.now());
        input.value = '';
    }

    function renderChatList() {
        const container = document.getElementById('msgsListContainer');
        container.innerHTML = 'Ładowanie rozmów...';
        db.ref('chats').once('value', (snap) => {
            container.innerHTML = '';
            let found = false;
            snap.forEach(chat => {
                const chatId = chat.key;
                if(chatId.includes(user.email.replace(/\./g, ','))) {
                    found = true;
                    const lastMsg = Object.values(chat.val()).pop();
                    const partnerEmail = chatId.replace(user.email.replace(/\./g, ','), '').replace('_', '').replace(/,/g, '.');
                    container.innerHTML += `
                        <div class="ad-card" onclick="openChat('Rozmowa', '${partnerEmail}')">
                            <b>${partnerEmail}</b>
                            <p style="color:var(--sec); font-size:13px; margin-top:5px">${lastMsg.text}</p>
                        </div>`;
                }
            });
            if(!found) container.innerHTML = "Brak aktywnych rozmów.";
        });
    }

    // Nasłuchiwanie powiadomień
    if(user) {
        db.ref('notifications/' + user.email.replace(/\./g, ',')).on('value', (snap) => {
            if(snap.exists() && document.getElementById('chat-window').style.display !== 'flex') {
                document.getElementById('chat-dot').style.display = 'block';
            }
        });
    }

    renderAds();
    if(user) renderProfile();
</script>
</body>
</html>
