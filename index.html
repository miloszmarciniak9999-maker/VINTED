<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EDU CORE PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --bg: #0b0e14;
            --card: #1c2128;
            --primary: #007aff;
            --accent: #58a6ff;
            --text: #f0f6fc;
            --sec: #8b949e;
            --border: rgba(255, 255, 255, 0.1);
            --grad: linear-gradient(135deg, #007aff 0%, #0051af 100%);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 110px;
        }

        header {
            padding: 25px 20px;
            text-align: center;
            background: rgba(11, 14, 20, 0.8);
            backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-weight: 800; font-size: 20px; letter-spacing: -1px;
            background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .container { padding: 15px; max-width: 550px; margin: 0 auto; }

        .main-nav-tabs {
            display: flex; background: rgba(255, 255, 255, 0.05); padding: 5px;
            border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1; padding: 12px; border: none; border-radius: 16px;
            background: transparent; color: var(--sec); cursor: pointer;
            font-weight: 600; font-size: 14px; transition: 0.3s;
        }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 8px 20px rgba(0, 122, 255, 0.3); }

        /* --- FILTRY --- */
        .filter-section {
            background: var(--card); padding: 20px; border-radius: 24px;
            margin-bottom: 25px; border: 1px solid var(--border);
        }

        .subject-scroll {
            display: flex; overflow-x: auto; gap: 10px; margin: 15px 0;
            padding-bottom: 5px; scrollbar-width: none;
        }
        .subject-scroll::-webkit-scrollbar { display: none; }

        .chip {
            white-space: nowrap; padding: 10px 18px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); border-radius: 50px; font-size: 13px;
            font-weight: 600; color: var(--sec); cursor: pointer;
        }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* --- WYSZUKIWARKA MIEJSCOWOŚCI --- */
        #locationSearchWrapper {
            margin-top: 12px;
            display: none; /* Pokazywane tylko dla "Na żywo" */
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .ad-card {
            background: var(--card); border-radius: 28px; padding: 24px;
            margin-bottom: 20px; border: 1px solid var(--border);
        }

        .price-tag { font-size: 22px; font-weight: 800; color: white; margin: 15px 0; }
        .price-tag span { font-size: 14px; color: var(--sec); font-weight: 400; }

        .badge-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .badge {
            padding: 5px 12px; background: rgba(88, 166, 255, 0.1);
            color: var(--accent); border-radius: 10px; font-size: 11px; font-weight: 700;
        }
        .badge.loc { background: rgba(34, 197, 94, 0.1); color: #4ade80; }

        .btn-main {
            width: 100%; padding: 18px; border: none; border-radius: 20px;
            background: var(--grad); color: white; font-weight: 700; font-size: 16px;
        }

        .navbar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(28, 33, 40, 0.95);
            backdrop-filter: blur(20px); display: flex; border-radius: 30px;
            border: 1px solid var(--border); padding: 12px 0; z-index: 900;
        }
        .nav-item { flex: 1; text-align: center; color: var(--sec); }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 22px; display: block; }

        select, input, textarea { 
            width: 100%; padding: 16px; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            border-radius: 18px; color: white; margin-bottom: 12px; font-size: 15px; outline: none;
        }

        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

<header><div class="logo">EDUCORE PRO</div></header>

<div id="home" class="page active">
    <div class="container">
        <div class="main-nav-tabs">
            <button class="tab-btn active" id="viewTutors" onclick="toggleHomeView('tutor')">👨‍🏫 Nauczyciele</button>
            <button class="tab-btn" id="viewStudents" onclick="toggleHomeView('student')">🎓 Uczniowie</button>
        </div>

        <div class="filter-section">
            <input type="text" id="filterSearch" placeholder="🔍 Szukaj przedmiotu (np. Matematyka)..." oninput="renderAds()">
            
            <div class="subject-scroll">
                <div class="chip active" onclick="filterBySub(this, 'all')">Wszystkie</div>
                <div class="chip" onclick="filterBySub(this, 'Angielski')">🇬🇧 Angielski</div>
                <div class="chip" onclick="filterBySub(this, 'Matematyka')">🔢 Matematyka</div>
                <div class="chip" onclick="filterBySub(this, 'Polski')">🇵🇱 Polski</div>
                <div class="chip" onclick="filterBySub(this, 'Fizyka')">🧪 Fizyka</div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px">
                <select id="filterLevel" onchange="renderAds()">
                    <option value="all">Każdy poziom</option>
                    <option value="A1">A1</option><option value="B2">B2</option><option value="C2">C2</option>
                </select>
                <select id="filterType" onchange="handleTypeChange()">
                    <option value="all">Zdalnie / Live</option>
                    <option value="online">🌐 Tylko Zdalnie</option>
                    <option value="live">📍 Na żywo</option>
                </select>
            </div>

            <div id="locationSearchWrapper">
                <input type="text" id="filterLoc" placeholder="🏙️ Wpisz miasto (np. Warszawa)..." oninput="renderAds()">
            </div>
        </div>

        <div id="adsContainer"></div>
    </div>
</div>

<div id="add" class="page">
    <div class="container">
        <h2 style="font-weight: 800;">Nowe ogłoszenie</h2>
        <div class="main-nav-tabs">
            <button class="tab-btn active" onclick="setAddMode('tutor')">Będę uczyć</button>
            <button class="tab-btn" onclick="setAddMode('student')">Szukam lekcji</button>
        </div>
        <input type="text" id="addSub" placeholder="Przedmiot (np. 🇬🇧 Angielski)">
        <input type="number" id="addPrice" placeholder="Cena (zł / h)">
        <select id="addType" onchange="toggleAddLoc()">
            <option value="online">Lekcje Zdalne 🌐</option>
            <option value="live">Na żywo 📍</option>
        </select>
        <input type="text" id="addLoc" placeholder="W jakim mieście?" style="display:none">
        <textarea id="addDesc" rows="4" placeholder="Opisz ofertę..."></textarea>
        <button class="btn-main" onclick="postAd()">Opublikuj</button>
    </div>
</div>

<nav class="navbar">
    <div class="nav-item active" onclick="nav('home', this)"><span class="nav-icon">🏠</span></div>
    <div class="nav-item" onclick="nav('add', this)"><span class="nav-icon">➕</span></div>
    <div class="nav-item" onclick="nav('profile', this)"><span class="nav-icon">👤</span></div>
</nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAbs_Z_Oqy2FrWP3CuGK9w9qjDMYGDhgck",
        authDomain: "educore-5c9f4.firebaseapp.com",
        databaseURL: "https://educore-5c9f4-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "educore-5c9f4",
        storageBucket: "educore-5c9f4.firebasestorage.app",
        messagingSenderId: "213055938628",
        appId: "1:213055938628:web:408b3beb4273d4f6f59c11"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let user = JSON.parse(localStorage.getItem('edu_user'));
    let homeView = 'tutor';
    let addMode = 'tutor';
    let selectedChipSub = 'all';

    function handleTypeChange() {
        const type = document.getElementById('filterType').value;
        document.getElementById('locationSearchWrapper').style.display = (type === 'live') ? 'block' : 'none';
        renderAds();
    }

    function toggleAddLoc() {
        document.getElementById('addLoc').style.display = (document.getElementById('addType').value === 'live') ? 'block' : 'none';
    }

    function filterBySub(el, sub) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        selectedChipSub = sub;
        renderAds();
    }

    function toggleHomeView(v) {
        homeView = v;
        document.getElementById('viewTutors').classList.toggle('active', v === 'tutor');
        document.getElementById('viewStudents').classList.toggle('active', v === 'student');
        renderAds();
    }

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function postAd() {
        if(!user) return alert("Zaloguj się w profilu!");
        db.ref('ads').push({
            sub: document.getElementById('addSub').value,
            price: document.getElementById('addPrice').value,
            type: document.getElementById('addType').value,
            loc: document.getElementById('addLoc').value,
            desc: document.getElementById('addDesc').value,
            role: addMode,
            email: user.email,
            time: Date.now()
        }).then(() => { alert("Dodano!"); nav('home', document.querySelector('.nav-item')); });
    }

    function renderAds() {
        const search = document.getElementById('filterSearch').value.toLowerCase();
        const cityFilter = document.getElementById('filterLoc').value.toLowerCase();
        const typeFilter = document.getElementById('filterType').value;

        db.ref('ads').on('value', (snap) => {
            const container = document.getElementById('adsContainer');
            container.innerHTML = '';
            snap.forEach(child => {
                const a = child.val();
                if (a.role !== homeView) return;
                if (selectedChipSub !== 'all' && !a.sub.includes(selectedChipSub)) return;
                if (search && !a.sub.toLowerCase().includes(search)) return;
                if (typeFilter !== 'all' && a.type !== typeFilter) return;
                if (typeFilter === 'live' && cityFilter && !a.loc.toLowerCase().includes(cityFilter)) return;

                container.innerHTML += `
                    <div class="ad-card">
                        <div class="badge-row">
                            <div class="badge">${a.type === 'online' ? '🌐 Zdalnie' : '📍 Na żywo'}</div>
                            ${a.loc ? `<div class="badge loc">🏙️ ${a.loc}</div>` : ''}
                        </div>
                        <h3 style="margin:0; font-size: 20px;">${a.sub}</h3>
                        <p style="color:var(--sec); font-size:14px; margin:10px 0;">${a.desc}</p>
                        <div class="price-tag">${a.price} <span>zł / h</span></div>
                        <button class="btn-main" onclick="alert('Czat wkrótce!')">Napisz</button>
                    </div>`;
            });
        });
    }

    renderAds();
</script>
</body>
</html>
