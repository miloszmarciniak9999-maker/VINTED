<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mój Portfel Vinted</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --sec: #999999;
            --acc: #00c2c2;
            --err: #ff5c5c;
            --border: #222222;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            overscroll-behavior-y: contain;
            -webkit-tap-highlight-color: transparent;
        }

        /* Nagłówek */
        .header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
        }
        .header span { font-size: 20px; }

        /* Oczekujące środki */
        .pending {
            color: var(--sec);
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            margin-top: 5px;
        }

        /* Sekcja Salda - KLIKALNA */
        .balance-box {
            text-align: center;
            padding: 30px 0;
            cursor: pointer;
        }
        .amount { font-size: 48px; font-weight: 700; margin-bottom: 5px; }
        .label { color: var(--sec); font-size: 14px; }

        /* Przyciski Akcji */
        .actions {
            display: flex;
            justify-content: center;
            gap: 45px;
            margin: 20px 0 40px 0;
        }
        .act { display: flex; flex-direction: column; align-items: center; font-size: 13px; color: var(--text); }
        .icon {
            width: 55px; height: 55px;
            background: #1a1a1a;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 8px; font-size: 22px;
            border: 1px solid #333;
        }

        /* Historia Transakcji */
        .history {
            background: var(--bg);
            padding: 0 20px 120px 20px;
            border-top: 1px solid var(--border);
        }
        .month { color: var(--sec); font-size: 14px; margin: 25px 0 15px 0; }
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
            border-bottom: 0.5px solid var(--border);
        }
        .item-info b { display: block; font-size: 16px; margin-bottom: 4px; font-weight: 500; }
        .item-info small { color: var(--sec); font-size: 13px; }
        .item-price { font-weight: 600; font-size: 16px; display: flex; align-items: center; }
        .item-price span { color: #555; margin-left: 10px; font-size: 18px; font-weight: normal; }
        .neg { color: var(--err); }

        /* Dolny pasek */
        .navbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #000;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(12px + env(safe-area-inset-bottom));
            border-top: 1px solid #222;
            z-index: 100;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--sec); font-size: 11px; text-decoration: none; width: 20%; }
        .nav-item.active { color: var(--acc); }
        .nav-icon { font-size: 24px; margin-bottom: 4px; position: relative; }
        .badge { position: absolute; top: -1px; right: -3px; background: var(--err); width: 9px; height: 9px; border-radius: 50%; border: 2px solid #000; }

        /* Animacja odświeżania */
        #refresh { text-align: center; height: 0; overflow: hidden; transition: 0.3s; color: var(--acc); font-size: 13px; line-height: 40px; }
    </style>
</head>
<body>

    <div id="refresh">Odświeżanie...</div>

    <div class="header">
        <span>←</span>
        <strong>Mój Portfel Vinted</strong>
        <span>⚙️</span>
    </div>

    <div class="pending">
        <span>Oczekujące środki</span>
        <span>0,00 zł ⓘ</span>
    </div>

    <div class="balance-box" onclick="askAmount()">
        <div class="amount" id="total">0,00 zł</div>
        <div class="label">Dostępne środki</div>
    </div>

    <div class="actions">
        <div class="act"><div class="icon">🏦</div>Wypłać</div>
        <div class="act"><div class="icon">🛒</div>Kup</div>
        <div class="act"><div class="icon">❤️</div>Przekaż</div>
    </div>

    <div class="history">
        <div class="month">marzec 2026</div>
        <div id="list">
            </div>
        
        <div class="month" style="margin-top: 40px;">Saldo początkowe</div>
        <div class="item">
            <div class="item-info">
                <b>Saldo początkowe</b>
                <small>1 mar 2026</small>
            </div>
            <div class="item-price">0,00 zł <span>&rsaquo;</span></div>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-item">
            <div class="nav-icon">🏠</div>
            Nowości
        </div>
        <div class="nav-item">
            <div class="nav-icon">🔍</div>
            Szukaj
        </div>
        <div class="nav-item">
            <div class="nav-icon">➕</div>
            Sprzedaj
        </div>
        <div class="nav-item">
            <div class="nav-icon">✉️<div class="badge"></div></div>
            Wiadomości
        </div>
        <div class="nav-item active">
            <div class="nav-icon">👤</div>
            Profil
        </div>
    </nav>

    <script>
        let bal = parseFloat(localStorage.getItem('v_bal')) || 0;
        let hist = JSON.parse(localStorage.getItem('v_hist')) || [];

        function render() {
            document.getElementById('total').innerText = bal.toFixed(2).replace('.', ',') + ' zł';
            const list = document.getElementById('list');
            list.innerHTML = '';
            
            hist.slice().reverse().forEach(i => {
                const isNeg = i.ty === 'out';
                list.innerHTML += `
                    <div class="item">
                        <div class="item-info">
                            <b>${i.t}</b>
                            <small>${i.d}</small>
                        </div>
                        <div class="item-price ${isNeg ? 'neg' : ''}">
                            ${isNeg ? '-' : ''}${i.a.toFixed(2).replace('.', ',')} zł <span>&rsaquo;</span>
                        </div>
                    </div>
                `;
            });
            localStorage.setItem('v_bal', bal);
            localStorage.setItem('v_hist', JSON.stringify(hist));
        }

        function askAmount() {
            const mode = confirm("Kliknij OK, aby dodać SPRZEDAŻ.\nKliknij ANULUJ, aby dodać WYPŁATĘ.");
            const val = prompt("Wpisz kwotę (np. 130):");
            const num = parseFloat(val);
            
            if(!num || num <= 0) return;

            const d = new Date().getDate() + ' mar 2026';
            if(mode) {
                bal += num;
                hist.push({t: 'Sprzedane', a: num, ty: 'in', d: d});
            } else {
                bal -= num;
                hist.push({t: 'Wypłata na konto bankowe', a: num, ty: 'out', d: d});
            }
            render();
        }

        // Pull to refresh logic
        let startY = 0;
        window.addEventListener('touchstart', e => { startY = e.touches[0].pageY; });
        window.addEventListener('touchmove', e => {
            if (window.scrollY === 0 && e.touches[0].pageY > startY + 60) {
                document.getElementById('refresh').style.height = '40px';
            }
        });
        window.addEventListener('touchend', () => {
            setTimeout(() => {
                document.getElementById('refresh').style.height = '0';
                render();
            }, 600);
        });

        render();
    </script>
</body>
</html>
