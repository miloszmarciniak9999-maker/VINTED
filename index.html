<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Doradca Marketingowy</title>

<style>
body {
font-family: Arial, sans-serif;
background: #0f172a;
color: white;
margin: 0;
padding: 0;
}

.container {
max-width: 900px;
margin: auto;
padding: 20px;
}

h1 {
text-align: center;
color: #38bdf8;
}

.chat-box {
background: #020617;
border-radius: 10px;
padding: 15px;
height: 500px;
overflow-y: auto;
border: 1px solid #1e293b;
}

.message {
margin: 10px 0;
padding: 12px;
border-radius: 8px;
}

.user {
background: #2563eb;
text-align: right;
}

.ai {
background: #1e293b;
}

.input-area {
display: flex;
margin-top: 10px;
}

input {
flex: 1;
padding: 12px;
border-radius: 8px;
border: none;
font-size: 16px;
}

button {
margin-left: 10px;
padding: 12px 20px;
border: none;
border-radius: 8px;
background: #38bdf8;
color: black;
font-weight: bold;
cursor: pointer;
}

button:hover {
background: #0ea5e9;
}
</style>
</head>

<body>

<div class="container">
<h1>🤖 AI Doradca Marketingowy</h1>

<div class="chat-box" id="chat"></div>

<div class="input-area">
<input type="text" id="input" placeholder="Np. prowadzę konto o fitness..." />
<button onclick="sendMessage()">Wyślij</button>
</div>
</div>

<script>

function addMessage(text, sender) {
const chat = document.getElementById("chat");
const div = document.createElement("div");
div.classList.add("message");
div.classList.add(sender);
div.innerText = text;
chat.appendChild(div);
chat.scrollTop = chat.scrollHeight;
}

function generateAIResponse(input) {
input = input.toLowerCase();

let response = "📊 Analiza marketingowa:\n\n";

if(input.includes("fitness")) {
response += "🎬 Pomysł na rolkę:\n";
response += "3 błędy które niszczą twoje efekty na siłowni\n\n";
response += "📝 Opis:\n";
response += "Robisz to i nie widzisz efektów? Sprawdź czy nie popełniasz tych błędów!\n\n";
response += "#️⃣ Hashtagi:\n";
response += "#fitness #silownia #trening #motywacja #fitpolska #gym #workout";
}

else if(input.includes("biznes")) {
response += "🎬 Pomysł na rolkę:\n";
response += "Dlaczego 90% biznesów nie rośnie na Instagramie\n\n";
response += "📝 Opis:\n";
response += "Jeśli robisz te 3 rzeczy — blokujesz swój rozwój.\n\n";
response += "#️⃣ Hashtagi:\n";
response += "#biznes #marketing #instagramtips #socialmedia #rozwojbiznesu";
}

else {
response += "🎬 Pomysł na rolkę:\n";
response += "3 błędy które robisz w social media\n\n";
response += "📝 Opis:\n";
response += "Sprawdź czy nie blokujesz swoich zasięgów.\n\n";
response += "#️⃣ Hashtagi:\n";
response += "#marketing #rolki #instagram #socialmedia #zasięgi";
}

response += "\n\n📈 Co poprawić:";
response += "\n- mocniejszy hook w 3 sekundy";
response += "\n- dodaj napisy";
response += "\n- krótsze ujęcia";
response += "\n- CTA na końcu";

return response;
}

function sendMessage() {
const input = document.getElementById("input");
const text = input.value;

if(text.trim() === "") return;

addMessage(text, "user");

setTimeout(() => {
const aiResponse = generateAIResponse(text);
addMessage(aiResponse, "ai");
}, 500);

input.value = "";
}

</script>

</body>
</html>
