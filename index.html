<div class="amount" id="total">0,00 zł</div>
        <div class="label">Dostępne środki</div>
    </div>

    <div class="actions">
        <div class="act"><div class="icon">🏦</div>Wypłać</div>
        <div class="act"><div class="icon">🛒</div>Kup</div>
        <div class="act"><div class="icon">❤️</div>Przekaż</div>
    </div>

    <div class="history">
        <div class="month" id="current-month">marzec 2026</div>
        <div id="list">
            </div>
    </div>

    <div style="height: 180px;"></div> <div class="input-panel">
        <input type="number" id="val" placeholder="Wpisz kwotę (np. 130)" step="0.01">
        <div class="btns">
            <button onclick="add('earn')" style="background: var(--acc)">DODAJ SPRZEDAŻ</button>
            <button onclick="add('out')" style="background: var(--err)">WYPŁAĆ</button>
        </div>
    </div>

    <script>
        let bal = parseFloat(localStorage.getItem('v_bal')) || 0;
        let hist = JSON.parse(localStorage.getItem('v_hist')) || [];

        function render() {
            document.getElementById('total').innerText = bal.toFixed(2).replace('.', ',') + ' zł';
            const list = document.getElementById('list');
            list.innerHTML = '';
            
            hist.slice().reverse().forEach(i => {
                const isNeg = i.ty === 'out';
                list.innerHTML += `
                    <div class="item">
                        <div class="item-info">
                            <b>${i.t}</b>
                            <small>${i.d}</small>
                        </div>
                        <div class="item-price ${isNeg ? 'neg' : ''}">
                            ${isNeg ? '-' : ''}${i.a.toFixed(2).replace('.', ',')} zł 
                            <span style="color:#666; font-size:12px; margin-left:5px;">&gt;</span>
                        </div>
                    </div>
                `;
            });
            localStorage.setItem('v_bal', bal);
            localStorage.setItem('v_hist', JSON.stringify(hist));
        }

        function add(type) {
            const input = document.getElementById('val');
            const v = parseFloat(input.value);
            if(!v || v <= 0) return;

            const now = new Date();
            const dateStr = now.getDate() + ' mar 2026';

            if(type === 'earn') {
                bal += v;
                hist.push({t: 'Sprzedane', a: v, ty: 'in', d: dateStr});
            } else {
                bal -= v;
                hist.push({t: 'Wypłata na konto bankowe', a: v, ty: 'out', d: dateStr});
            }
            input.value = '';
            render();
        }

        // Prosty Pull-to-refresh
        let startY = 0;
        window.addEventListener('touchstart', e => { startY = e.touches[0].pageY; });
        window.addEventListener('touchmove', e => {
            const y = e.touches[0].pageY;
            if (window.scrollY === 0 && y > startY + 50) {
                document.getElementById('refresh-icon').style.height = '40px';
            }
        });
        window.addEventListener('touchend', () => {
            setTimeout(() => {
                document.getElementById('refresh-icon').style.height = '0';
                render(); // "Odświeża" dane z pamięci
            }, 500);
        });

        render();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
