<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>EDU CORE PRO</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

:root{
--bg:#0b0e14;
--card:#1c2128;
--primary:#007aff;
--text:#f0f6fc;
--sec:#8b949e;
--border:rgba(255,255,255,0.08);
--danger:#ff453a;
}

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:var(--bg);
color:var(--text);
margin:0;
padding-bottom:100px;
}

.container{padding:12px;max-width:480px;margin:0 auto;}

input,select,textarea{
width:100%;
padding:14px;
background:#1c2128;
border:1px solid var(--border);
border-radius:15px;
color:white;
margin-bottom:10px;
box-sizing:border-box;
}

.page{display:none;}
.page.active{display:block;}

.ad-card{
background:var(--card);
border-radius:20px;
padding:18px;
margin-bottom:12px;
border:1px solid var(--border);
}

.navbar{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:380px;
background:rgba(28,33,40,0.95);
display:flex;
border-radius:25px;
border:1px solid var(--border);
padding:10px 0;
}

.nav-item{
flex:1;
text-align:center;
color:var(--sec);
cursor:pointer;
font-size:22px;
}

.nav-item.active{color:var(--primary);}

#chat-window{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:var(--bg);
z-index:2000;
display:none;
flex-direction:column;
}

.btn-action{
width:100%;
padding:14px;
border-radius:14px;
border:none;
font-weight:700;
cursor:pointer;
}
</style>
</head>

<body>

<div id="chat-window">
<div style="padding:15px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between">
<b id="chat-title">Rozmowa</b>
<button onclick="closeChat()" style="background:none;border:none;color:white;font-size:22px">✕</button>
</div>

<div id="chat-box" style="flex:1;overflow:auto;padding:15px;display:flex;flex-direction:column;gap:10px"></div>

<div style="padding:15px;display:flex;gap:8px">
<input id="chat-input" placeholder="Wiadomość...">
<button onclick="sendMsg()" style="width:50px;background:var(--primary);border:none;border-radius:12px;color:white">➔</button>
</div>
</div>

<div id="messages" class="page active">
<div class="container">
<h2>Wiadomości</h2>
<div id="chatListContainer"></div>
</div>
</div>

<nav class="navbar">
<div class="nav-item active" onclick="renderChatList()">💬</div>
</nav>

<script>
// FIREBASE
const firebaseConfig={
apiKey:"AIzaSyAbs_Z_Oqy2FrWP3CuGK9w9qjDMYGDhgck",
authDomain:"educore-5c9f4.firebaseapp.com",
databaseURL:"https://educore-5c9f4-default-rtdb.europe-west1.firebasedatabase.app/",
projectId:"educore-5c9f4",
storageBucket:"educore-5c9f4.firebasestorage.app",
messagingSenderId:"213055938628",
appId:"1:213055938628:web:408b3beb4273d4f6f59c11"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let user=JSON.parse(localStorage.getItem('edu_user')) || {name:"User",email:prompt("Podaj email")};
localStorage.setItem('edu_user',JSON.stringify(user));

let activeChatID=null;

function cleanEmail(e){return e.toLowerCase().replace(/\./g,',')}
function getChatID(a,b){return [cleanEmail(a),cleanEmail(b)].sort().join('_')}

// CLEAR OLD
db.ref('chats').remove();

// OPEN CHAT
function openChat(email,name){

activeChatID=getChatID(user.email,email);

document.getElementById('chat-title').innerText=name;
document.getElementById('chat-window').style.display='flex';

db.ref('chats/'+activeChatID).off();

db.ref('chats/'+activeChatID)
.orderByChild('time')
.on('value',snap=>{

const box=document.getElementById('chat-box');
box.innerHTML='';

snap.forEach(m=>{
const d=m.val();
const me=d.sender===user.email;

box.innerHTML+=`
<div onclick="deleteMsg('${m.key}')"
style="
align-self:${me?'flex-end':'flex-start'};
background:${me?'#007aff':'#252b33'};
padding:10px;
border-radius:12px;
max-width:80%">
${d.text}
</div>`;
});

box.scrollTop=box.scrollHeight;
});
}

// SEND
function sendMsg(){
const i=document.getElementById('chat-input');
if(!i.value.trim()) return;

db.ref('chats/'+activeChatID).push({
sender:user.email,
text:i.value.trim(),
time:Date.now()
});

i.value='';
}

// ENTER
document.getElementById('chat-input').addEventListener('keypress',e=>{
if(e.key==='Enter') sendMsg();
});

// DELETE
function deleteMsg(id){
db.ref('chats/'+activeChatID+'/'+id).remove();
}

// CLOSE
function closeChat(){
if(activeChatID) db.ref('chats/'+activeChatID).off();
document.getElementById('chat-window').style.display='none';
}

// LIST
function renderChatList(){

const my=cleanEmail(user.email);

db.ref('chats').on('value',snap=>{

const list=document.getElementById('chatListContainer');
list.innerHTML='';

snap.forEach(c=>{
if(!c.key.includes(my)) return;

const parts=c.key.split('_');
const partner=parts.find(p=>p!==my).replace(/,/g,'.');

list.innerHTML+=`
<div class="ad-card" onclick="openChat('${partner}','${partner}')">
💬 ${partner}
</div>`;
});
});
}

renderChatList();
</script>

</body>
</html>
