```html
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDU CORE PRO</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
body{margin:0;background:#0b0e14;color:white;font-family:sans-serif}
.page{display:none;padding:15px}
.page.active{display:block}
.navbar{position:fixed;bottom:0;left:0;right:0;background:#111;display:flex}
.nav-item{flex:1;text-align:center;padding:15px;color:#aaa}
.nav-item.active{color:#007aff}
input,textarea,select{width:100%;padding:12px;margin-bottom:10px;background:#1c2128;border:none;border-radius:10px;color:white}
button{padding:12px;border:none;border-radius:10px;background:#007aff;color:white;width:100%}
.ad-card{background:#1c2128;padding:15px;border-radius:15px;margin-bottom:10px}
#chat-window{position:fixed;top:0;left:0;width:100%;height:100%;background:#0b0e14;display:none;flex-direction:column}
</style>
</head>

<body>

<div id="home" class="page active">
<h2>Ogłoszenia</h2>
<div id="ads"></div>
</div>

<div id="messages" class="page">
<h2>Wiadomości</h2>
<div id="chatList"></div>
</div>

<div id="add" class="page">
<h2>Dodaj ogłoszenie</h2>
<input id="sub" placeholder="Przedmiot">
<input id="price" placeholder="Cena">
<textarea id="desc" placeholder="Opis"></textarea>
<button onclick="postAd()">Dodaj</button>
</div>

<div id="profile" class="page">
<h2>Profil</h2>
<input id="name" placeholder="Imię">
<input id="email" placeholder="Email">
<button onclick="saveUser()">Zapisz</button>
</div>

<div id="chat-window">
<div style="padding:10px;border-bottom:1px solid #333">
<b id="chat-title"></b>
<button onclick="closeChat()" style="float:right">X</button>
</div>
<div id="chat-box" style="flex:1;overflow:auto;padding:10px"></div>
<div style="display:flex">
<input id="chat-input">
<button onclick="sendMsg()">➤</button>
</div>
</div>

<div class="navbar">
<div class="nav-item active" onclick="nav('home',this)">🏠</div>
<div class="nav-item" onclick="nav('messages',this)">💬</div>
<div class="nav-item" onclick="nav('add',this)">➕</div>
<div class="nav-item" onclick="nav('profile',this)">👤</div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyAbs_Z_Oqy2FrWP3CuGK9w9qjDMYGDhgck",
authDomain:"educore-5c9f4.firebaseapp.com",
databaseURL:"https://educore-5c9f4-default-rtdb.europe-west1.firebasedatabase.app/",
projectId:"educore-5c9f4"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let user=JSON.parse(localStorage.getItem('user'))||{};
let activeChatID=null;

function nav(id,el){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
el.classList.add('active');
if(id==="home")loadAds();
if(id==="messages")loadChats();
}

function saveUser(){
user={name:name.value,email:email.value};
localStorage.setItem('user',JSON.stringify(user));
}

function postAd(){
db.ref('ads').push({sub:sub.value,price:price.value,desc:desc.value,owner:user.email});
}

function loadAds(){
db.ref('ads').on('value',snap=>{
ads.innerHTML='';
snap.forEach(c=>{
let a=c.val();
ads.innerHTML+=`
<div class="ad-card">
<b>${a.sub}</b><br>
${a.price} zł<br>
<button onclick="openChat('${a.owner}','${a.owner}')">Napisz</button>
</div>`;
});
});
}

function clean(e){return e.replace(/\./g,',')}
function chatID(a,b){return[clean(a),clean(b)].sort().join('_')}

function openChat(email,name){
activeChatID=chatID(user.email,email);
chat-title.innerText=name;
chat-window.style.display='flex';

db.ref('chats/'+activeChatID).off();

db.ref('chats/'+activeChatID).on('value',snap=>{
chat-box.innerHTML='';
snap.forEach(m=>{
let d=m.val();
chat-box.innerHTML+=`<div>${d.text}</div>`;
});
});
}

function sendMsg(){
db.ref('chats/'+activeChatID).push({
sender:user.email,
text:chat-input.value,
time:Date.now()
});
chat-input.value='';
}

chat-input.addEventListener('keypress',e=>{
if(e.key==='Enter')sendMsg();
});

function closeChat(){
chat-window.style.display='none';
}

function loadChats(){
db.ref('chats').on('value',snap=>{
chatList.innerHTML='';
snap.forEach(c=>{
if(!c.key.includes(clean(user.email)))return;
let p=c.key.replace(clean(user.email),'').replace('_','').replace(/,/g,'.');
chatList.innerHTML+=`
<div class="ad-card" onclick="openChat('${p}','${p}')">
💬 ${p}
</div>`;
});
});
}

loadAds();
</script>

</body>
</html>
```
