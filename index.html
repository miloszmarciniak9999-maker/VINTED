<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfel Vinted</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --sec: #999999;
            --acc: #008080;
            --err: #ff5c5c;
            --border: #1a1a1a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            overscroll-behavior-y: contain;
        }

        /* Górna belka i Oczekujące */
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .pending { color: var(--sec); font-size: 14px; display: flex; justify-content: space-between; padding: 10px 20px; cursor: pointer; }

        /* Główna Kwota - KLIKALNA */
        .balance-box { text-align: center; padding: 30px 0; cursor: pointer; }
        .amount { font-size: 44px; font-weight: bold; margin: 5px 0; }
        .label { color: var(--sec); font-size: 13px; }

        .actions { display: flex; justify-content: center; gap: 40px; margin: 20px 0; opacity: 0.8; }
        .act { display: flex; flex-direction: column; align-items: center; font-size: 12px; }
        .icon { width: 55px; height: 55px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; font-size: 22px; }

        /* Historia */
        .history { padding: 0 20px; border-top: 8px solid #080808; min-height: 400px; }
        .month { color: var(--sec); font-size: 13px; padding: 20px 0 10px 0; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 0.5px solid var(--border); }
        .item-info b { display: block; font-size: 15px; }
        .item-info small { color: var(--sec); font-size: 12px; }
        .item-price { font-weight: bold; font-size: 15px; }
        .neg { color: var(--err); }

        /* PANELE WPISYWANIA - UKRYTE DOMYŚLNIE */
        .input-area { 
            background: #111; padding: 25px 15px; border-top: 1px solid #333; 
            position: fixed; bottom: 0; width: 100%; box-sizing: border-box; 
            display: none; z-index: 1000;
        }

        input { background: #222; border: 1px solid #333; color: #fff; padding: 15px; width: 100%; border-radius: 8px; box-sizing: border-box; margin-bottom: 15px; font-size: 18px; }
        .btns { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border-radius: 5px; border: none; color: #fff; font-weight: bold; cursor: pointer; }
        .close-btn { color: var(--sec); text-align: center; font-size: 12px; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="header"><span>←</span><strong>Mój Portfel Vinted</strong><span>⚙️</span></div>
    
    <div class="pending" onclick="openPanel('pending')">
        <span>Oczekujące środki</span>
        <span id="p-display">0,00 zł ⓘ</span>
    </div>

    <div class="balance-box" onclick="openPanel('available')">
        <div class="amount" id="total">0,00 zł</div>
        <div class="label">Dostępne środki</div>
    </div>

    <div class="actions">
        <div class="act"><div class="icon">🏦</div>Wypłać</div>
        <div class="act"><div class="icon">🛒</div>Kup</div>
        <div class="act"><div class="icon">❤️</div>Przekaż</div>
    </div>

    <div class="history">
        <div class="month">marca 2026</div>
        <div id="list"></div>
    </div>

    <div id="panel-available" class="input-area">
        <input type="number" id="val-available" placeholder="Wpisz kwotę (np. 130)" inputmode="decimal">
        <div class="btns">
            <button onclick="add('available', 'in')" style="background: #008080;">DODAJ</button>
            <button onclick="add('available', 'out')" style="background: #333;">WYPŁAĆ</button>
        </div>
        <div class="close-btn" onclick="closeAll()">ANULUJ</div>
    </div>

    <div id="panel-pending" class="input-area">
        <input type="number" id="val-pending" placeholder="Kwota oczekująca" inputmode="decimal">
        <button onclick="add('pending', 'set')" style="background: #008080; width: 100%;">USTAW OCZEKUJĄCE</button>
        <div class="close-btn" onclick="closeAll()">ANULUJ</div>
    </div>

    <script>
        let b = parseFloat(localStorage.getItem('v_b')) || 0;
        let p = parseFloat(localStorage.getItem('v_p')) || 0;
        let h = JSON.parse(localStorage.getItem('v_h')) || [];

        function openPanel(t) {
            closeAll();
            document.getElementById('panel-' + t).style.display = 'block';
            document.getElementById('val-' + t).focus();
        }

        function closeAll() {
            document.getElementById('panel-available').style.display = 'none';
            document.getElementById('panel-pending').style.display = 'none';
        }

        function render() {
            document.getElementById('total').innerText = b.toFixed(2).replace('.', ',') + ' zł';
            document.getElementById('p-display').innerText = p.toFixed(2).replace('.', ',') + ' zł ⓘ';
            const list = document.getElementById('list');
            list.innerHTML = '';
            h.slice().reverse().forEach(i => {
                list.innerHTML += `<div class="item"><div class="item-info"><b>${i.t}</b><small>${i.d}</small></div><div class="item-price ${i.ty==='out'?'neg':''}">${i.ty==='out'?'-':''}${i.a.toFixed(2).replace('.',',')} zł ></div></div>`;
            });
            localStorage.setItem('v_b', b); localStorage.setItem('v_p', p); localStorage.setItem('v_h', JSON.stringify(h));
        }

        function add(target, type) {
            const val = parseFloat(document.getElementById('val-' + target).value);
            if(isNaN(val)) return;
            const d = new Date().getDate() + " mar 2026";
            if(target === 'available') {
                if(type==='in') { b += val; h.push({t:'Sprzedane', a:val, ty:'in', d:d}); }
                else { b -= val; h.push({t:'Wypłata na konto', a:val, ty:'out', d:d}); }
            } else { p = val; }
            document.getElementById('val-' + target).value = '';
            closeAll(); render();
        }

        render();
    </script>
</body>
</html>
