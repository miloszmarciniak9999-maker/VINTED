<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EDU CORE PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --bg: #0b0e14;
            --card: #1c2128;
            --primary: #007aff;
            --text: #f0f6fc;
            --sec: #8b949e;
            --border: rgba(255, 255, 255, 0.1);
            --danger: #ff453a;
            --grad: linear-gradient(135deg, #007aff 0%, #0051af 100%);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 110px;
        }

        header {
            padding: 20px;
            text-align: center;
            background: rgba(11, 14, 20, 0.8);
            backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .container { padding: 15px; max-width: 550px; margin: 0 auto; }

        .main-nav-tabs {
            display: flex; background: rgba(255, 255, 255, 0.05); padding: 5px;
            border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1; padding: 12px; border: none; border-radius: 16px;
            background: transparent; color: var(--sec); cursor: pointer;
            font-weight: 600; font-size: 14px;
        }
        .tab-btn.active { background: var(--primary); color: white; }

        .subject-scroll {
            display: flex; overflow-x: auto; gap: 8px; margin: 10px 0;
            padding-bottom: 5px; scrollbar-width: none;
        }
        .subject-scroll::-webkit-scrollbar { display: none; }

        .chip {
            white-space: nowrap; padding: 10px 15px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); border-radius: 50px; font-size: 13px;
            font-weight: 600; color: var(--sec); cursor: pointer; transition: 0.2s;
        }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        .ad-card { 
            background: var(--card); border-radius: 28px; padding: 20px; 
            margin-bottom: 15px; border: 1px solid var(--border); 
        }
        .badge {
            display: inline-block; padding: 4px 10px; background: rgba(0, 122, 255, 0.1);
            color: var(--primary); border-radius: 8px; font-size: 11px; font-weight: 700; margin-right: 5px;
        }

        .btn-main {
            width: 100%; padding: 16px; border: none; border-radius: 18px;
            background: var(--grad); color: white; font-weight: 700; cursor: pointer;
        }
        .btn-danger { background: rgba(255, 69, 58, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        .navbar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(28, 33, 40, 0.95);
            backdrop-filter: blur(20px); display: flex; border-radius: 30px;
            border: 1px solid var(--border); padding: 10px 0; z-index: 900;
        }
        .nav-item { flex: 1; text-align: center; color: var(--sec); cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: 800; }

        .page { display: none; }
        .page.active { display: block; }

        input, select, textarea { 
            width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 15px; color: white; margin-bottom: 10px; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: var(--primary); }
    </style>
</head>
<body>

<header><div style="font-weight:800; color:var(--primary); letter-spacing: 1px;">EDUCORE PRO</div></header>

<div id="home" class="page active">
    <div class="container">
        <div class="main-nav-tabs">
            <button class="tab-btn active" id="viewTutors" onclick="toggleHomeView('tutor')">👨‍🏫 Nauczyciele</button>
            <button class="tab-btn" id="viewStudents" onclick="toggleHomeView('student')">🎓 Uczniowie</button>
        </div>
        <div class="filter-section">
            <input type="text" id="filterSearch" placeholder="🔍 Szukaj przedmiotu..." oninput="renderAds()">
            <div class="subject-scroll">
                <div class="chip active" onclick="filterBySub(this, 'all')">Wszystkie</div>
                <div class="chip" onclick="filterBySub(this, 'Angielski')">🇬🇧 Angielski</div>
                <div class="chip" onclick="filterBySub(this, 'Matematyka')">🔢 Matematyka</div>
                <div class="chip" onclick="filterBySub(this, 'Polski')">🇵🇱 Polski</div>
                <div class="chip" onclick="filterBySub(this, 'Fizyka')">🧪 Fizyka</div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                <select id="filterType" onchange="renderAds()">
                    <option value="all">Typ lekcji</option>
                    <option value="online">🌐 Zdalnie</option>
                    <option value="live">📍 Na żywo</option>
                </select>
                <input type="text" id="filterLoc" placeholder="Miejscowość..." oninput="renderAds()">
            </div>
        </div>
        <div id="adsContainer" style="margin-top:10px"></div>
    </div>
</div>

<div id="add" class="page">
    <div class="container">
        <h2 style="font-weight: 800; margin-bottom: 5px;">Dodaj ogłoszenie</h2>
        <p style="color:var(--sec); font-size:14px; margin-bottom: 20px;">Wybierz kogo szukasz i uzupełnij dane.</p>
        
        <div class="main-nav-tabs">
            <button class="tab-btn active" id="addBtnTutor" onclick="setAddMode('tutor')">Będę uczyć</button>
            <button class="tab-btn" id="addBtnStudent" onclick="setAddMode('student')">Szukam lekcji</button>
        </div>

        <label style="font-size:12px; color:var(--sec); font-weight:700; margin-left:5px;">WYBIERZ PRZEDMIOT</label>
        <div class="subject-scroll">
            <div class="chip" onclick="selectAddSub('🇬🇧 Angielski')">🇬🇧 Angielski</div>
            <div class="chip" onclick="selectAddSub('🔢 Matematyka')">🔢 Matematyka</div>
            <div class="chip" onclick="selectAddSub('🇵🇱 Polski')">🇵🇱 Polski</div>
            <div class="chip" onclick="selectAddSub('🧪 Fizyka')">🧪 Fizyka</div>
            <div class="chip" onclick="selectAddSub('🇩🇪 Niemiecki')">🇩🇪 Niemiecki</div>
        </div>
        <input type="text" id="addSub" placeholder="Lub wpisz inny przedmiot...">

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
            <input type="number" id="addPrice" placeholder="Cena (zł/h)">
            <select id="addLevel">
                <option value="Dowolny">Poziom</option>
                <option value="A1">Podstawowy (A1)</option>
                <option value="B2">Średni (B2)</option>
                <option value="C2">Ekspert (C2)</option>
            </select>
        </div>

        <select id="addType" onchange="document.getElementById('addLocBox').style.display = (this.value==='live'?'block':'none')">
            <option value="online">Lekcje Zdalne 🌐</option>
            <option value="live">Lekcje Na żywo 📍</option>
        </select>

        <div id="addLocBox" style="display:none">
            <input type="text" id="addLoc" placeholder="W jakim mieście?">
        </div>

        <textarea id="addDesc" rows="4" placeholder="Napisz coś o sobie lub o wymaganiach..."></textarea>
        
        <button class="btn-main" onclick="postAd()">Opublikuj ogłoszenie</button>
    </div>
</div>

<div id="profile" class="page">
    <div class="container" id="profileBox">
        <h2 style="font-weight: 800;">Twój Profil</h2>
        <input type="text" id="userName" placeholder="Twoje Imię / Nick">
        <input type="email" id="userEmail" placeholder="Twój E-mail">
        <button class="btn-main" onclick="saveUser()">Zapisz Dane</button>
    </div>
</div>

<nav class="navbar">
    <div class="nav-item active" onclick="nav('home', this)">🏠</div>
    <div class="nav-item" onclick="nav('add', this)">➕</div>
    <div class="nav-item" onclick="nav('profile', this)">👤</div>
</nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAbs_Z_Oqy2FrWP3CuGK9w9qjDMYGDhgck",
        authDomain: "educore-5c9f4.firebaseapp.com",
        databaseURL: "https://educore-5c9f4-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "educore-5c9f4",
        storageBucket: "educore-5c9f4.firebasestorage.app",
        messagingSenderId: "213055938628",
        appId: "1:213055938628:web:408b3beb4273d4f6f59c11"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let user = JSON.parse(localStorage.getItem('edu_user'));
    let homeView = 'tutor';
    let addMode = 'tutor';
    let selectedHomeSub = 'all';

    function selectAddSub(val) {
        document.getElementById('addSub').value = val;
    }

    function setAddMode(m) {
        addMode = m;
        document.getElementById('addBtnTutor').classList.toggle('active', m === 'tutor');
        document.getElementById('addBtnStudent').classList.toggle('active', m === 'student');
    }

    function toggleHomeView(v) {
        homeView = v;
        document.getElementById('viewTutors').classList.toggle('active', v === 'tutor');
        document.getElementById('viewStudents').classList.toggle('active', v === 'student');
        renderAds();
    }

    function filterBySub(el, s) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        selectedHomeSub = s;
        renderAds();
    }

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(id === 'home') renderAds();
        if(id === 'profile') renderProfile();
    }

    function saveUser() {
        const n = document.getElementById('userName').value;
        const e = document.getElementById('userEmail').value;
        if(n && e) {
            user = {name: n, email: e};
            localStorage.setItem('edu_user', JSON.stringify(user));
            location.reload();
        }
    }

    function renderProfile() {
        if(user) {
            document.getElementById('profileBox').innerHTML = `
                <div style="text-align:center">
                    <div style="font-size:60px; margin-bottom:10px">👤</div>
                    <h2>${user.name}</h2>
                    <p style="color:var(--sec)">${user.email}</p>
                    <button class="btn-main btn-danger" style="margin-top:20px" onclick="localStorage.clear(); location.reload();">Wyloguj się</button>
                </div>`;
        }
    }

    function postAd() {
        if(!user) return alert("Uzupełnij profil w zakładce profilu!");
        const sub = document.getElementById('addSub').value;
        const price = document.getElementById('addPrice').value;
        if(!sub || !price) return alert("Podaj przedmiot i cenę!");

        db.ref('ads').push({
            sub, price,
            level: document.getElementById('addLevel').value,
            type: document.getElementById('addType').value,
            loc: document.getElementById('addLoc').value || "",
            desc: document.getElementById('addDesc').value,
            role: addMode,
            owner: user.name,
            email: user.email,
            time: Date.now()
        }).then(() => { 
            alert("Ogłoszenie dodane!"); 
            nav('home', document.querySelectorAll('.nav-item')[0]); 
        });
    }

    function renderAds() {
        const search = document.getElementById('filterSearch').value.toLowerCase();
        const city = document.getElementById('filterLoc').value.toLowerCase();
        const type = document.getElementById('filterType').value;

        db.ref('ads').on('value', (snap) => {
            const container = document.getElementById('adsContainer');
            container.innerHTML = '';
            snap.forEach(child => {
                const a = child.val();
                if (a.role !== homeView) return;
                if (selectedHomeSub !== 'all' && !a.sub.includes(selectedHomeSub)) return;
                if (search && !a.sub.toLowerCase().includes(search)) return;
                if (type !== 'all' && a.type !== type) return;
                if (city && a.loc && !a.loc.toLowerCase().includes(city)) return;

                const isMe = user && user.email === a.email;
                container.innerHTML += `
                    <div class="ad-card">
                        <div style="margin-bottom:10px">
                            <span class="badge">${a.level}</span>
                            <span class="badge">${a.type === 'online' ? '🌐 Zdalnie' : '📍 ' + a.loc}</span>
                        </div>
                        <h3 style="margin:0">${a.sub}</h3>
                        <p style="color:var(--sec); font-size:13px; margin:10px 0;">${a.desc}</p>
                        <div style="font-weight:800; font-size:18px; color:white">${a.price} zł/h</div>
                        ${isMe ? `<button class="btn-main btn-danger" style="margin-top:10px" onclick="db.ref('ads').child('${child.key}').remove()">Usuń ogłoszenie</button>` : 
                        `<button class="btn-main" style="margin-top:10px" onclick="alert('Napisz do: ${a.email}')">Napisz wiadomość</button>`}
                    </div>`;
            });
        });
    }

    renderAds();
    if(user) renderProfile();
</script>
</body>
</html>
