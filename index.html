<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EDU CORE PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --bg: #0b0e14;
            --card: #1c2128;
            --primary: #007aff;
            --text: #f0f6fc;
            --sec: #8b949e;
            --border: rgba(255, 255, 255, 0.08);
            --danger: #ff453a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 100px;
        }

        /* --- TOAST NOTIFICATION (ZAMIAST BRZYDKIEGO ALERTA) --- */
        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 12px 25px;
            border-radius: 50px; font-weight: 600; z-index: 9999;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- UI FIX DLA SELECT I INPUT (DARK MODE) --- */
        select, input, textarea { 
            width: 100%; padding: 16px; background: #252b33 !important; 
            border: 1px solid var(--border) !important;
            border-radius: 18px; color: white !important; margin-bottom: 12px; 
            font-size: 15px; outline: none; appearance: none; box-sizing: border-box;
        }

        /* --- KARTY OGŁOSZEŃ --- */
        .ad-card { 
            background: var(--card); border-radius: 24px; padding: 20px; 
            margin-bottom: 15px; border: 1px solid var(--border); 
        }

        .main-nav-tabs {
            display: flex; background: rgba(255, 255, 255, 0.03); padding: 5px;
            border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1; padding: 12px; border: none; border-radius: 16px;
            background: transparent; color: var(--sec); cursor: pointer;
            font-weight: 600; transition: 0.3s;
        }
        .tab-btn.active { background: var(--primary); color: white; }

        /* --- NAVBAR --- */
        .navbar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(28, 33, 40, 0.95);
            backdrop-filter: blur(15px); display: flex; border-radius: 30px;
            border: 1px solid var(--border); padding: 12px 0; z-index: 900;
        }
        .nav-item { flex: 1; text-align: center; color: var(--sec); cursor: pointer; font-size: 22px; }
        .nav-item.active { color: var(--primary); }

        /* --- CZAT MODAL --- */
        #chat-window {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; display: none; flex-direction: column;
        }

        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

<div id="toast">Gotowe!</div>

<div id="chat-window">
    <div style="padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
        <b id="chat-title">Rozmowa</b>
        <button onclick="closeChat()" style="background:none; border:none; color:white; font-size: 20px;">✕</button>
    </div>
    <div id="chat-box" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:10px;"></div>
    <div style="padding: 20px; display: flex; gap: 10px;">
        <input type="text" id="chat-input" placeholder="Napisz wiadomość..." style="margin:0">
        <button onclick="sendMsg()" style="background:var(--primary); border:none; border-radius:15px; width:60px; color:white;">➔</button>
    </div>
</div>

<div id="home" class="page active">
    <div style="padding: 15px;">
        <div class="main-nav-tabs">
            <button class="tab-btn active" id="t-tutor" onclick="setHomeView('tutor')">👨‍🏫 Nauczyciele</button>
            <button class="tab-btn" id="t-student" onclick="setHomeView('student')">🎓 Uczniowie</button>
        </div>
        <div id="adsContainer"></div>
    </div>
</div>

<div id="messages" class="page">
    <div style="padding: 20px;">
        <h2>Wiadomości</h2>
        <div id="chatListContainer"></div>
    </div>
</div>

<div id="add" class="page">
    <div style="padding: 20px;">
        <h2>Dodaj ogłoszenie</h2>
        <div class="main-nav-tabs">
            <button class="tab-btn active" id="a-tutor" onclick="addRole='tutor'; updateAddTabs()">Będę uczyć</button>
            <button class="tab-btn" id="a-student" onclick="addRole='student'; updateAddTabs()">Szukam lekcji</button>
        </div>
        <input type="text" id="addSub" placeholder="Przedmiot (np. Matematyka)">
        <input type="number" id="addPrice" placeholder="Cena zł/h">
        <select id="addLevel">
            <option value="Dowolny">Dowolny Poziom</option>
            <option value="Podstawowy">Podstawowy</option>
            <option value="Średni">Średni</option>
            <option value="Zaawansowany">Zaawansowany</option>
        </select>
        <textarea id="addDesc" rows="4" placeholder="Opis ogłoszenia..."></textarea>
        <button onclick="postAd()" style="width:100%; padding:18px; border-radius:18px; border:none; background:var(--primary); color:white; font-weight:800;">Opublikuj</button>
    </div>
</div>

<div id="profile" class="page">
    <div style="padding: 20px;">
        <h2>Twój Profil</h2>
        <input type="text" id="userName" placeholder="Twoje Imię">
        <input type="email" id="userEmail" placeholder="Twój E-mail">
        <button onclick="saveUser()" style="width:100%; padding:15px; border-radius:15px; border:none; background:var(--primary); color:white;">Zapisz</button>
    </div>
</div>

<nav class="navbar">
    <div class="nav-item active" onclick="nav('home', this)">🏠</div>
    <div class="nav-item" onclick="nav('messages', this)">💬</div>
    <div class="nav-item" onclick="nav('add', this)">➕</div>
    <div class="nav-item" onclick="nav('profile', this)">👤</div>
</nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAbs_Z_Oqy2FrWP3CuGK9w9qjDMYGDhgck",
        authDomain: "educore-5c9f4.firebaseapp.com",
        databaseURL: "https://educore-5c9f4-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "educore-5c9f4",
        storageBucket: "educore-5c9f4.firebasestorage.app",
        messagingSenderId: "213055938628",
        appId: "1:213055938628:web:408b3beb4273d4f6f59c11"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = JSON.parse(localStorage.getItem('edu_user'));
    let currentView = 'tutor';
    let addRole = 'tutor';
    let activeChatID = null;

    function showToast(m) {
        const t = document.getElementById('toast'); t.innerText = m; t.style.top = '30px';
        setTimeout(() => t.style.top = '-100px', 3000);
    }

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        if(id === 'home') renderAds();
        if(id === 'messages') renderChatList();
    }

    function setHomeView(v) {
        currentView = v;
        document.getElementById('t-tutor').classList.toggle('active', v==='tutor');
        document.getElementById('t-student').classList.toggle('active', v==='student');
        renderAds();
    }

    function updateAddTabs() {
        document.getElementById('a-tutor').classList.toggle('active', addRole==='tutor');
        document.getElementById('a-student').classList.toggle('active', addRole==='student');
    }

    function saveUser() {
        const n = document.getElementById('userName').value;
        const e = document.getElementById('userEmail').value;
        if(n && e) {
            user = {name: n, email: e};
            localStorage.setItem('edu_user', JSON.stringify(user));
            showToast("Zapisano profil!");
        }
    }

    function postAd() {
        if(!user) return showToast("Uzupełnij profil najpierw!");
        const data = {
            sub: document.getElementById('addSub').value,
            price: document.getElementById('addPrice').value,
            level: document.getElementById('addLevel').value,
            desc: document.getElementById('addDesc').value,
            role: addRole, owner: user.name, email: user.email, time: Date.now()
        };
        db.ref('ads').push(data).then(() => {
            showToast("Ogłoszenie dodane!");
            nav('home', document.querySelectorAll('.nav-item')[0]);
        });
    }

    function renderAds() {
        db.ref('ads').on('value', snap => {
            const cont = document.getElementById('adsContainer'); cont.innerHTML = '';
            snap.forEach(c => {
                const a = c.val();
                if(a.role !== currentView) return;
                const isMe = user && user.email === a.email;
                cont.innerHTML += `
                    <div class="ad-card">
                        <small style="color:var(--primary); font-weight:800;">${a.level.toUpperCase()}</small>
                        <h3 style="margin:5px 0">${a.sub}</h3>
                        <p style="color:var(--sec); font-size:14px;">${a.desc}</p>
                        <div style="font-weight:800; font-size:20px; margin-bottom:15px;">${a.price} zł/h</div>
                        ${isMe ? `<button onclick="db.ref('ads').child('${c.key}').remove()" style="width:100%; padding:12px; background:var(--danger); border:none; border-radius:12px; color:white;">Usuń moje ogłoszenie</button>` : 
                        `<button onclick="openChat('${a.email}','${a.owner}')" style="width:100%; padding:12px; background:var(--primary); border:none; border-radius:12px; color:white;">Napisz wiadomość</button>`}
                    </div>`;
            });
        });
    }

    function openChat(pEmail, pName) {
        if(!user) return nav('profile', document.querySelectorAll('.nav-item')[3]);
        activeChatID = [user.email, pEmail].sort().join('_').replace(/\./g, ',');
        document.getElementById('chat-title').innerText = pName;
        document.getElementById('chat-window').style.display = 'flex';
        db.ref('chats/' + activeChatID).on('value', snap => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            snap.forEach(m => {
                const d = m.val();
                const me = d.sender === user.email;
                box.innerHTML += `<div style="align-self:${me?'flex-end':'flex-start'}; background:${me? 'var(--primary)':'#252b33'}; padding:10px 15px; border-radius:15px; max-width:80%;">${d.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function closeChat() { document.getElementById('chat-window').style.display = 'none'; }

    function sendMsg() {
        const i = document.getElementById('chat-input');
        if(!i.value || !activeChatID) return;
        db.ref('chats/' + activeChatID).push({ sender: user.email, text: i.value, time: Date.now() });
        i.value = '';
    }

    function renderChatList() {
        if(!user) return;
        db.ref('chats').once('value', snap => {
            const list = document.getElementById('chatListContainer'); list.innerHTML = '';
            snap.forEach(c => {
                if(c.key.includes(user.email.replace(/\./g, ','))) {
                    const p = c.key.split('_').find(x => x !== user.email.replace(/\./g, ',')).replace(/,/g,'.');
                    list.innerHTML += `<div class="ad-card" onclick="openChat('${p}', 'Rozmowa')"><b>Rozmowa z: ${p}</b></div>`;
                }
            });
        });
    }

    renderAds();
</script>
</body>
</html>
