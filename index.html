<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EDU CORE PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #0a0b10;
            --card: #161b22;
            --primary: #0070f3;
            --text: #f0f6fc;
            --sec: #8b949e;
            --border: #30363d;
            --danger: #da3633;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 100px; /* Miejsce na większy pasek */
        }

        header {
            padding: 20px;
            text-align: center;
            background: rgba(10, 11, 16, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .container { padding: 15px; max-width: 500px; margin: 0 auto; }

        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: white; padding: 12px 25px;
            border-radius: 50px; font-weight: bold; z-index: 2000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            display: none;
        }

        .ad-card {
            background: var(--card); border-radius: 16px; padding: 20px;
            margin-bottom: 15px; border: 1px solid var(--border);
        }

        .price-tag { 
            display: inline-block; padding: 6px 14px; background: rgba(0, 112, 243, 0.1); 
            color: var(--primary); border-radius: 10px; font-weight: 800; margin-top: 10px;
        }

        .btn-main {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            background: var(--primary); color: white; font-weight: 800;
            cursor: pointer; margin-top: 10px; font-size: 15px;
        }

        /* --- POWIĘKSZONY PASEK DOLNY --- */
        .navbar {
            position: fixed; bottom: 0; width: 100%; background: #161b22;
            display: flex; border-top: 1px solid var(--border);
            padding: 12px 0;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            z-index: 1000;
        }
        .nav-item { 
            flex: 1; text-align: center; color: var(--sec); 
            font-size: 13px; cursor: pointer; position: relative;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        
        .nav-icon { font-size: 22px; }

        /* Kropka powiadomienia */
        #chat-dot {
            position: absolute; top: 0; right: 25%;
            width: 10px; height: 10px; background: var(--danger);
            border-radius: 50%; border: 2px solid #161b22;
            display: none;
        }

        .page { display: none; }
        .page.active { display: block; }

        input, textarea { 
            width: 100%; padding: 15px; background: #0d1117; border: 1px solid var(--border);
            border-radius: 12px; color: white; margin-bottom: 10px; box-sizing: border-box;
            font-size: 16px;
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1500;
        }
        .modal { background: var(--card); width: 85%; padding: 20px; border-radius: 20px; text-align: center; }
    </style>
</head>
<body>

<div id="toast">Sukces!</div>

<header>
    <h1 style="margin:0; font-size: 18px; letter-spacing: 2px;">EDU CORE PRO</h1>
</header>

<div id="home" class="page active">
    <div class="container" id="adsContainer">Ładowanie ogłoszeń...</div>
</div>

<div id="messages" class="page">
    <div class="container">
        <h2 style="color: var(--primary)">Twoje Rozmowy</h2>
        <div id="msgsContainer">Zaloguj się w zakładce Profil.</div>
    </div>
</div>

<div id="add" class="page">
    <div class="container">
        <h2>Nowe Ogłoszenie</h2>
        <input type="text" id="addSub" placeholder="Przedmiot (np. Fizyka)">
        <input type="text" id="addPrice" placeholder="Cena (np. 70 zł/h)">
        <textarea id="addDesc" placeholder="Opis oferty..."></textarea>
        <button class="btn-main" onclick="postAd()">Dodaj na stałe</button>
    </div>
</div>

<div id="profile" class="page">
    <div class="container" id="profileContent">
        <h2>Twój Profil</h2>
        <input type="text" id="userName" placeholder="Twój Nick">
        <input type="email" id="userEmail" placeholder="Twój E-mail">
        <button class="btn-main" onclick="saveUser()">Zapisz Profil</button>
    </div>
</div>

<div class="modal-overlay" id="msgModal">
    <div class="modal">
        <h3 id="modalTitle">Napisz wiadomość</h3>
        <textarea id="modalInput" placeholder="Twoja wiadomość..."></textarea>
        <button class="btn-main" onclick="sendMessage()">Wyślij</button>
        <button class="btn-main" style="background: #30363d" onclick="closeModal()">Anuluj</button>
    </div>
</div>

<nav class="navbar">
    <div class="nav-item active" onclick="nav('home', this)">
        <span class="nav-icon">🏠</span> Eksploruj
    </div>
    <div class="nav-item" onclick="nav('messages', this)">
        <div id="chat-dot"></div>
        <span class="nav-icon">💬</span> Czaty
    </div>
    <div class="nav-item" onclick="nav('add', this)">
        <span class="nav-icon">➕</span> Dodaj
    </div>
    <div class="nav-item" onclick="nav('profile', this)">
        <span class="nav-icon">⚙️</span> Profil
    </div>
</nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAbs_Z_Oqy2FrWP3CuGK9w9qjDMYGDhgck",
        authDomain: "educore-5c9f4.firebaseapp.com",
        databaseURL: "https://educore-5c9f4-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "educore-5c9f4",
        storageBucket: "educore-5c9f4.firebasestorage.app",
        messagingSenderId: "213055938628",
        appId: "1:213055938628:web:408b3beb4273d4f6f59c11"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const adminEmail = "milosz.marciniak9999@gmail.com";

    let user = JSON.parse(localStorage.getItem('edu_user'));
    let activeTarget = null;

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        
        if(id === 'home') renderAds();
        if(id === 'messages') {
            renderMsgs();
            document.getElementById('chat-dot').style.display = 'none';
        }
        if(id === 'profile') renderProfile();
    }

    function showToast(txt) {
        const t = document.getElementById('toast');
        t.innerText = txt; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2500);
    }

    function saveUser() {
        const n = document.getElementById('userName').value;
        const e = document.getElementById('userEmail').value;
        if(n && e) {
            user = {name: n, email: e};
            localStorage.setItem('edu_user', JSON.stringify(user));
            showToast("Profil zapisany!");
            renderProfile();
        }
    }

    function renderProfile() {
        if(user) {
            document.getElementById('profileContent').innerHTML = `
                <div style="text-align:center; padding: 20px;">
                    <h2 style="color: var(--primary)">${user.name}</h2>
                    <p style="color:var(--sec)">${user.email}</p>
                    <button class="btn-main" style="background: var(--danger); margin-top: 40px;" 
                        onclick="localStorage.clear(); location.reload();">🔴 Wyloguj się</button>
                </div>`;
        }
    }

    function postAd() {
        if(!user) return showToast("Zaloguj się w Profilu!");
        const sub = document.getElementById('addSub').value;
        const price = document.getElementById('addPrice').value;
        const desc = document.getElementById('addDesc').value;
        if(!sub || !price) return;

        db.ref('ads').push({
            sub, price, desc, owner: user.name, email: user.email, time: Date.now()
        }).then(() => {
            showToast("Dodano!");
            nav('home', document.querySelector('.nav-item'));
        });
    }

    function deleteAd(key) {
        if(confirm("Usunąć to ogłoszenie?")) {
            db.ref('ads').child(key).remove().then(() => showToast("Usunięto!"));
        }
    }

    function renderAds() {
        db.ref('ads').on('value', (snap) => {
            const container = document.getElementById('adsContainer');
            container.innerHTML = '';
            snap.forEach(child => {
                const a = child.val();
                const key = child.key;
                const canDelete = user && (user.email === a.email || user.email === adminEmail);
                
                container.innerHTML += `
                    <div class="ad-card">
                        <small style="color:var(--primary)">@${a.owner}</small>
                        <h3 style="margin:5px 0">${a.sub}</h3>
                        <p style="font-size:14px; color:var(--sec)">${a.desc}</p>
                        <div class="price-tag">${a.price}</div>
                        <button class="btn-main" onclick="openModal('${a.owner}', '${a.email}')">📩 Napisz</button>
                        ${canDelete ? `<button class="btn-main" style="background:var(--danger)" onclick="deleteAd('${key}')">🗑️ Usuń</button>` : ''}
                    </div>`;
            });
        });
    }

    function openModal(name, email) {
        if(!user) return showToast("Zaloguj się!");
        if(user.email === email) return;
        activeTarget = {name, email};
        document.getElementById('msgModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('msgModal').style.display = 'none'; }

    function sendMessage() {
        const txt = document.getElementById('modalInput').value;
        if(!txt) return;
        db.ref('messages').push({
            to: activeTarget.email, from: user.name, fromEmail: user.email,
            text: txt, date: new Date().toLocaleString(), read: false
        }).then(() => {
            showToast("Wysłano!");
            closeModal();
        });
    }

    function renderMsgs() {
        if(!user) return;
        db.ref('messages').on('value', (snap) => {
            const container = document.getElementById('msgsContainer');
            container.innerHTML = '';
            snap.forEach(child => {
                const m = child.val();
                if(m.to === user.email) {
                    container.innerHTML += `
                        <div class="ad-card" style="border-left: 4px solid var(--primary)">
                            <small>Od: <b>${m.from}</b> (${m.date})</small>
                            <p>${m.text}</p>
                            <button class="btn-main" style="padding: 8px; font-size: 12px; background: #30363d" 
                                onclick="openModal('${m.from}', '${m.fromEmail}')">Odpisz</button>
                        </div>`;
                }
            });
        });
    }

    // Nasłuchiwanie nowych wiadomości dla kropki
    if(user) {
        db.ref('messages').on('child_added', (snap) => {
            const m = snap.val();
            const activePage = document.querySelector('.page.active').id;
            if(m.to === user.email && activePage !== 'messages') {
                document.getElementById('chat-dot').style.display = 'block';
            }
        });
    }

    renderAds();
    if(user) renderProfile();
</script>
</body>
</html>
