<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Korepetycje Plus</title>
    <style>
        :root {
            --primary: #008080;
            --bg: #f4f7f6;
            --white: #ffffff;
            --text: #333;
            --sec: #999;
            --err: #ff5c5c;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            padding-bottom: 80px;
        }

        header { background-color: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; }

        /* Menu górne */
        .tabs { display: flex; background: var(--white); border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 10; }
        .tab { flex: 1; text-align: center; padding: 15px; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--sec); }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        .container { padding: 15px; max-width: 600px; margin: 0 auto; }

        /* Karty ogłoszeń */
        .ad-card { background: var(--white); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: var(--shadow); position: relative; }
        .ad-card h3 { margin: 0 0 8px 0; color: var(--primary); }
        .price { font-weight: bold; color: #2ecc71; margin-top: 5px; }
        .msg-btn { background: #eee; border: none; padding: 8px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; margin-top: 10px; width: 100%; font-weight: bold; }

        /* Wiadomości */
        .msg-item { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--primary); box-shadow: var(--shadow); }
        .msg-item b { display: block; color: var(--primary); margin-bottom: 5px; }

        /* Formularze i strony */
        .page { display: none; }
        .page.active { display: block; }

        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* Navbar dół */
        .navbar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; text-align: center; padding: 10px 0; font-size: 11px; color: var(--sec); cursor: pointer; position: relative; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 20px; display: block; }
        .badge { position: absolute; top: 5px; right: 25%; background: var(--err); width: 8px; height: 8px; border-radius: 50%; display: none; }

        /* Profil */
        .profile-img { width: 80px; height: 80px; border-radius: 50%; background: #ddd; margin: 0 auto 10px; background-size: cover; border: 2px solid var(--primary); }
    </style>
</head>
<body>

<header>Korepetycje Plus</header>

<div id="homePage" class="page active">
    <div class="tabs">
        <div class="tab active" id="tabTutor" onclick="setCategory('tutor')">Korepetytorzy</div>
        <div class="tab" id="tabStudent" onclick="setCategory('student')">Uczniowie</div>
    </div>
    <div class="container" id="adsList"></div>
</div>

<div id="messagesPage" class="page">
    <div class="container">
        <h2>Twoje Wiadomości</h2>
        <div id="messagesList">
            <p style="color:#999; text-align:center;">Brak nowych wiadomości</p>
        </div>
    </div>
</div>

<div id="addPage" class="page">
    <div class="container">
        <h2>Nowe ogłoszenie</h2>
        <select id="adCat" style="width:100%; padding:10px; border-radius:8px; margin-bottom:10px;">
            <option value="tutor">Jestem Korepetytorem</option>
            <option value="student">Jestem Uczniem</option>
        </select>
        <input type="text" id="subject" placeholder="Przedmiot (np. Matematyka)">
        <input type="text" id="adPrice" placeholder="Cena (np. 60 zł/h)">
        <textarea id="desc" placeholder="Opis ogłoszenia..." rows="4"></textarea>
        <button class="btn" onclick="saveAd()">Opublikuj ogłoszenie</button>
    </div>
</div>

<div id="accountPage" class="page">
    <div class="container" id="accountContent">
        </div>
</div>

<nav class="navbar">
    <div class="nav-item active" onclick="showPage('homePage', this)">
        <span class="nav-icon">🏠</span>Ogłoszenia
    </div>
    <div class="nav-item" onclick="showPage('messagesPage', this)">
        <span class="nav-icon">✉️</span>Wiadomości
        <div id="msgBadge" class="badge"></div>
    </div>
    <div class="nav-item" onclick="showPage('addPage', this)">
        <span class="nav-icon">➕</span>Dodaj
    </div>
    <div class="nav-item" onclick="showPage('accountPage', this)">
        <span class="nav-icon">👤</span>Profil
    </div>
</nav>

<script>
    let cat = 'tutor';
    let user = JSON.parse(localStorage.getItem('kp_user')) || null;
    let ads = JSON.parse(localStorage.getItem('kp_ads')) || [];
    let msgs = JSON.parse(localStorage.getItem('kp_msgs')) || [];

    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        
        if(id === 'homePage') renderAds();
        if(id === 'messagesPage') renderMessages();
        if(id === 'accountPage') renderAccount();
    }

    function setCategory(c) {
        cat = c;
        document.getElementById('tabTutor').classList.toggle('active', c === 'tutor');
        document.getElementById('tabStudent').classList.toggle('active', c === 'student');
        renderAds();
    }

    // LOGIKA OGŁOSZEŃ
    function saveAd() {
        if(!user) return alert("Zaloguj się w zakładce Profil!");
        const ad = {
            id: Date.now(),
            cat: document.getElementById('adCat').value,
            sub: document.getElementById('subject').value,
            price: document.getElementById('adPrice').value,
            desc: document.getElementById('desc').value,
            author: user.name,
            authorEmail: user.email
        };
        ads.push(ad);
        localStorage.setItem('kp_ads', JSON.stringify(ads));
        alert("Dodano!");
        showPage('homePage', document.querySelectorAll('.nav-item')[0]);
    }

    function renderAds() {
        const div = document.getElementById('adsList');
        div.innerHTML = '';
        ads.filter(a => a.cat === cat).slice().reverse().forEach(a => {
            div.innerHTML += `
                <div class="ad-card">
                    <small>👤 ${a.author}</small>
                    <h3>${a.sub}</h3>
                    <p>${a.desc}</p>
                    <div class="price">${a.price}</div>
                    <button class="msg-btn" onclick="sendMsgPrompt('${a.author}', '${a.authorEmail}')">📩 Napisz wiadomość</button>
                </div>
            `;
        });
    }

    // LOGIKA WIADOMOŚCI
    function sendMsgPrompt(toName, toEmail) {
        if(!user) return alert("Musisz się zalogować, by pisać!");
        const txt = prompt(`Napisz wiadomość do: ${toName}`);
        if(!txt) return;

        const newMsg = {
            toEmail: toEmail,
            fromName: user.name,
            text: txt,
            date: new Date().toLocaleTimeString()
        };
        msgs.push(newMsg);
        localStorage.setItem('kp_msgs', JSON.stringify(msgs));
        alert("Wysłano!");
        updateBadge();
    }

    function renderMessages() {
        const div = document.getElementById('messagesList');
        div.innerHTML = '';
        const myMsgs = msgs.filter(m => m.toEmail === user?.email);
        
        if(myMsgs.length === 0) {
            div.innerHTML = '<p style="text-align:center; color:#999;">Brak wiadomości do Ciebie.</p>';
        } else {
            myMsgs.slice().reverse().forEach(m => {
                div.innerHTML += `
                    <div class="msg-item">
                        <b>Od: ${m.fromName} <small style="color:#999; font-weight:normal;">(${m.date})</small></b>
                        <span>${m.text}</span>
                    </div>
                `;
            });
        }
        document.getElementById('msgBadge').style.display = 'none';
    }

    function updateBadge() {
        if(!user) return;
        const count = msgs.filter(m => m.toEmail === user.email).length;
        if(count > 0) document.getElementById('msgBadge').style.display = 'block';
    }

    // PROFIL
    function renderAccount() {
        const div = document.getElementById('accountContent');
        if(!user) {
            div.innerHTML = `
                <h2>Zaloguj się</h2>
                <input type="text" id="loginName" placeholder="Twój Nick">
                <input type="email" id="loginEmail" placeholder="Twój E-mail">
                <button class="btn" onclick="login()">Stwórz profil</button>
            `;
        } else {
            div.innerHTML = `
                <div style="text-align:center;">
                    <div class="profile-img"></div>
                    <h2>Witaj, ${user.name}!</h2>
                    <p>${user.email}</p>
                    <button class="btn" style="background:#666" onclick="logout()">Wyloguj</button>
                </div>
            `;
        }
    }

    function login() {
        const n = document.getElementById('loginName').value;
        const e = document.getElementById('loginEmail').value;
        if(!n || !e) return alert("Uzupełnij dane!");
        user = { name: n, email: e };
        localStorage.setItem('kp_user', JSON.stringify(user));
        renderAccount();
        updateBadge();
    }

    function logout() {
        user = null;
        localStorage.removeItem('kp_user');
        renderAccount();
    }

    renderAds();
    updateBadge();
</script>

</body>
</html>
