<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korepetycje - Znajdź Pomoc</title>
    <style>
        :root {
            --primary: #008080;
            --bg: #f4f7f6;
            --white: #ffffff;
            --text: #333;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            padding-bottom: 60px;
        }

        header {
            background-color: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .tabs {
            display: flex;
            justify-content: center;
            background: var(--white);
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
        }

        .container {
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        .ad-card {
            background: var(--white);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
        }

        .ad-card h3 { margin: 0 0 10px 0; color: var(--primary); }
        .ad-card p { margin: 5px 0; font-size: 14px; }
        .ad-card .price { font-weight: bold; color: #2ecc71; font-size: 16px; }
        .ad-card .contact { 
            margin-top: 10px; 
            padding-top: 10px; 
            border-top: 1px solid #eee; 
            font-style: italic; 
            color: #666;
        }

        /* Formularz dodawania */
        .add-form {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none; /* Ukryty domyślnie */
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1>Korepetycje Plus</h1>
</header>

<div class="tabs">
    <div class="tab active" onclick="switchTab('tutor')">Korepetytorzy</div>
    <div class="tab" onclick="switchTab('student')">Uczniowie</div>
</div>

<div class="container">
    <div id="formSection" class="add-form">
        <h2 id="formTitle">Dodaj ogłoszenie</h2>
        <input type="text" id="subject" placeholder="Przedmiot (np. Matematyka)">
        <input type="text" id="name" placeholder="Twoje Imię">
        <input type="number" id="age" placeholder="Wiek">
        <input type="text" id="price" placeholder="Cena za godzinę (np. 50 zł)">
        <textarea id="desc" placeholder="Opis (czego uczysz / czego szukasz)"></textarea>
        <input type="text" id="contact" placeholder="Kontakt (Tel lub E-mail)">
        <button class="btn" onclick="saveAd()">Opublikuj ogłoszenie</button>
        <button class="btn" style="background:#666; margin-top:5px;" onclick="toggleForm()">Anuluj</button>
    </div>

    <div id="adsList"></div>
</div>

<div class="fab" onclick="toggleForm()">+</div>

<script>
    let currentTab = 'tutor';
    let ads = JSON.parse(localStorage.getItem('korepetycje_ads')) || [
        { type: 'tutor', subject: 'Matematyka', name: 'Ania', age: 22, price: '60 zł', desc: 'Pomogę w przygotowaniu do matury podstawowej.', contact: 'ania@mail.com' },
        { type: 'student', subject: 'Fizyka', name: 'Marek', age: 16, price: 'do 50 zł', desc: 'Szukam kogoś kto wytłumaczy mi dynamikę.', contact: '555-666-777' }
    ];

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        renderAds();
    }

    function toggleForm() {
        const form = document.getElementById('formSection');
        form.style.display = (form.style.display === 'block') ? 'none' : 'block';
        document.getElementById('formTitle').innerText = currentTab === 'tutor' ? 'Dodaj jako Korepetytor' : 'Dodaj jako Uczeń';
    }

    function saveAd() {
        const ad = {
            type: currentTab,
            subject: document.getElementById('subject').value,
            name: document.getElementById('name').value,
            age: document.getElementById('age').value,
            price: document.getElementById('price').value,
            desc: document.getElementById('desc').value,
            contact: document.getElementById('contact').value
        };

        if(!ad.subject || !ad.contact) return alert("Wypełnij przedmiot i kontakt!");

        ads.push(ad);
        localStorage.setItem('korepetycje_ads', JSON.stringify(ads));
        toggleForm();
        renderAds();
        
        // Czyścimy pola
        document.querySelectorAll('input, textarea').forEach(i => i.value = '');
    }

    function renderAds() {
        const list = document.getElementById('adsList');
        list.innerHTML = '';

        const filtered = ads.filter(ad => ad.type === currentTab);

        filtered.slice().reverse().forEach(ad => {
            list.innerHTML += `
                <div class="ad-card">
                    <h3>${ad.subject}</h3>
                    <p><strong>Imię:</strong> ${ad.name} (${ad.age} lat)</p>
                    <p>${ad.desc}</p>
                    <p class="price">Cena: ${ad.price}</p>
                    <div class="contact">Kontakt: ${ad.contact}</div>
                </div>
            `;
        });
    }

    renderAds();
</script>

</body>
</html>
